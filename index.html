<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seputar Link Videy</title>
    <meta name="theme-color" id="meta-theme" content="#f8fafc">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* BASE STYLE SAMA */
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; margin: 0; min-height: 100vh; overflow-x: hidden; }
        body.dark-mode { background-color: #050505; color: #e5e5e5; }
        
        /* PLAYER & TOOLS */
        #content-wrapper { width: 95%; max-width: 854px; margin: 10px auto; padding-bottom: 50px; }
        .player-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        video, iframe { width: 100%; height: 100%; border: none; }
        
        /* LIKE & COMMENT SECTION */
        .interaction-area { margin-top: 15px; padding: 15px; background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; }
        body.dark-mode .interaction-area { background: #1e1e1e; border-color: #333; }
        
        .like-btn { display: flex; align-items: center; gap: 8px; background: #fee2e2; color: #ef4444; padding: 8px 16px; border-radius: 20px; font-weight: 700; font-size: 14px; border: none; cursor: pointer; transition: 0.2s; }
        body.dark-mode .like-btn { background: #450a0a; color: #fca5a5; }
        .like-btn:active { transform: scale(0.95); }
        
        /* COMMENT FORM */
        .comment-form { margin-top: 20px; border-top: 1px solid #f1f5f9; pt-4; }
        body.dark-mode .comment-form { border-top-color: #333; }
        .input-box { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #cbd5e1; background: #f8fafc; font-size: 13px; }
        body.dark-mode .input-box { background: #1e293b; border-color: #475569; color: #fff; }
        
        .captcha-box { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; font-weight: 600; }
        
        .btn-send { background: #2563eb; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; }
        
        /* COMMENT LIST */
        .comment-list { margin-top: 20px; display: flex; flex-direction: column; gap: 12px; }
        .comment-item { background: #f1f5f9; padding: 10px; border-radius: 8px; font-size: 13px; }
        body.dark-mode .comment-item { background: #334155; }
        .c-name { font-weight: 700; margin-bottom: 2px; display: block; }
        .c-text { line-height: 1.4; }
        
        /* GATE & UTILS */
        #video-gate { position: absolute; inset: 0; z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); color: #fff; cursor: pointer; }
        .play-trigger { width: 60px; height: 60px; background: #2563eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 15px 0; }
        .gate-counter { font-weight: bold; background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px; }
        
        .btn-server { float: right; padding: 8px 12px; background: #fff; border: 1px solid #ccc; border-radius: 8px; font-size: 12px; cursor: pointer; }
        body.dark-mode .btn-server { background: #333; border-color: #444; color: #fff; }
        .server-dropdown { position: absolute; right: 0; top: 40px; background: #fff; border: 1px solid #ccc; display: none; z-index: 100; border-radius: 8px; overflow: hidden; }
        .server-dropdown.show { display: block; }
        .server-item { padding: 8px 15px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 13px; }
    </style>
</head>
<body>

<div id="content-wrapper">
    <div class="player-container">
        <!-- GATE -->
        <div id="video-gate" onclick="processGateClick()">
            <div style="text-align:center; font-weight:700;">Klik Play 5 Kali<br>Untuk Buka Video</div>
            <div class="play-trigger"><svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></div>
            <div class="gate-counter" id="counter-display">0 / 5</div>
        </div>
        <!-- IFRAME -->
        <iframe id="iframe-player" allowfullscreen style="width:100%; height:100%; display:none;"></iframe>
    </div>

    <!-- SERVER & THEME -->
    <div style="margin-top:10px; position:relative; height:40px;">
        <button onclick="toggleTheme()" style="float:left; padding:8px; border-radius:8px; border:1px solid #ccc; background:transparent;">🌓 Mode</button>
        
        <div style="float:right; position:relative;">
            <button class="btn-server" onclick="document.getElementById('server-list').classList.toggle('show')">
                <span id="current-server-name">Pilih Server</span> ▼
            </button>
            <div id="server-list" class="server-dropdown"></div>
        </div>
    </div>

    <!-- INTERACTION AREA -->
    <div class="interaction-area">
        <button class="like-btn" onclick="sendLike()">
            ❤️ <span id="like-count">0</span> Suka
        </button>

        <div class="comment-form">
            <h3 style="font-weight:700; margin-bottom:10px; font-size:14px;">Komentar</h3>
            <input type="text" id="c-name" class="input-box" placeholder="Nama / Samaran (Wajib)">
            <textarea id="c-text" class="input-box" style="height:60px; resize:none;" placeholder="Tulis komentar..."></textarea>
            
            <!-- CAPTCHA ALA ALA -->
            <div class="captcha-box">
                <span id="captcha-q">Berapa 1 + 1?</span>
                <input type="number" id="c-captcha" class="input-box" style="width:80px; margin-bottom:0;" placeholder="?">
            </div>

            <button class="btn-send" onclick="sendComment()">Kirim Komentar</button>
        </div>

        <div id="comment-list" class="comment-list">
            <!-- Komentar muncul disini -->
        </div>
    </div>
</div>

<script>
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }

    // --- GATE LOGIC ---
    const MAX = 5;
    const K_STORE = "gate_acts_" + (window.location.search || "home");
    let unlocked = false;
    let servers = [];

    function checkGate() {
        let c = parseInt(localStorage.getItem(K_STORE) || "0");
        if (c >= MAX) { document.getElementById('video-gate').style.display = 'none'; unlocked = true; } 
        else { document.getElementById('counter-display').innerText = c + " / 5"; }
    }

    function processGateClick() {
        let c = parseInt(localStorage.getItem(K_STORE) || "0");
        if (c < MAX) {
            c++; localStorage.setItem(K_STORE, c.toString()); 
            document.getElementById('counter-display').innerText = c + " / 5"; 
            window.open("https://omg10.com/4/10390860", '_blank'); 
            if (c >= MAX) {
                document.getElementById('video-gate').style.display = 'none';
                unlocked = true;
                if (servers.length > 0) play(0); 
            }
        }
    }

    // --- CAPTCHA GENERATOR ---
    let captchaAns = 0;
    function genCaptcha() {
        let a = Math.floor(Math.random() * 10) + 1;
        let b = Math.floor(Math.random() * 10) + 1;
        captchaAns = a + b;
        document.getElementById('captcha-q').innerText = `Berapa ${a} + ${b}?`;
        document.getElementById('c-captcha').value = "";
    }

    // --- MAIN INIT ---
    async function init() {
        const p = new URLSearchParams(window.location.search);
        const id = p.get('id');
        if (!id) return;

        // 1. Load Video
        try {
            let res = await fetch(`/api/get?id=${id}`);
            if (res.ok) {
                let data = await res.json();
                servers = data.servers;
                checkGate();
                if (servers.length > 0) {
                    const list = document.getElementById('server-list');
                    servers.forEach((s, i) => {
                        let d = document.createElement('div');
                        d.className = 'server-item';
                        d.innerText = s.name;
                        d.onclick = () => { list.classList.remove('show'); play(i); };
                        list.appendChild(d);
                    });
                    document.getElementById('current-server-name').innerText = servers[0].name;
                    if(unlocked) play(0);
                }
            }
        } catch (e) {}

        // 2. Load Interactions (Like/Komen)
        loadInteractions(id);
        genCaptcha();
    }

    async function loadInteractions(id) {
        try {
            let res = await fetch(`/api/interact?id=${id}`);
            let data = await res.json();
            document.getElementById('like-count').innerText = data.likes || 0;
            
            const list = document.getElementById('comment-list');
            list.innerHTML = "";
            (data.comments || []).forEach(c => {
                list.innerHTML += `
                    <div class="comment-item">
                        <span class="c-name">${escapeHtml(c.name)} <small style="font-weight:400; opacity:0.7;">• ${new Date(c.date).toLocaleDateString()}</small></span>
                        <span class="c-text">${escapeHtml(c.text)}</span>
                    </div>`;
            });
        } catch(e) {}
    }

    async function sendLike() {
        const id = new URLSearchParams(window.location.search).get('id');
        if(!id) return;
        // Optimistic UI (Langsung nambah biar cepet)
        let countEl = document.getElementById('like-count');
        countEl.innerText = parseInt(countEl.innerText) + 1;

        await fetch(`/api/interact?id=${id}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ type: 'like' })
        });
    }

    async function sendComment() {
        const id = new URLSearchParams(window.location.search).get('id');
        const name = document.getElementById('c-name').value.trim();
        const text = document.getElementById('c-text').value.trim();
        const ans = parseInt(document.getElementById('c-captcha').value);

        if(!id) return;
        if(!name || !text) return alert("Nama dan Komentar wajib diisi!");
        if(ans !== captchaAns) {
            alert("Jawaban angka salah! Coba lagi.");
            genCaptcha();
            return;
        }

        document.querySelector('.btn-send').disabled = true;
        document.querySelector('.btn-send').innerText = "Mengirim...";

        try {
            let res = await fetch(`/api/interact?id=${id}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ type: 'comment', name, text })
            });

            if(res.ok) {
                document.getElementById('c-text').value = "";
                document.getElementById('c-name').value = ""; // Opsional, mau dikosongin atau ngga
                genCaptcha();
                loadInteractions(id); // Reload list
            }
        } catch(e) { alert("Gagal mengirim"); }

        document.querySelector('.btn-send').disabled = false;
        document.querySelector('.btn-send').innerText = "Kirim Komentar";
    }

    function play(idx) {
        if (!servers[idx] || !unlocked) return;
        document.getElementById('current-server-name').innerText = servers[idx].name;
        document.getElementById('iframe-player').src = servers[idx].url;
        document.getElementById('iframe-player').style.display = 'block';
    }

    function escapeHtml(text) {
        if (!text) return text;
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    init();
</script>
</body>
</html>

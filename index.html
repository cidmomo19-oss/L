<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="unsafe-url" />
    
    <title>Seputar Link Videy</title>

    <meta name="theme-color" id="meta-theme" content="#f8fafc">
    <link rel="icon" href="https://i.ibb.co.com/sdyjjS3s/Picsart-26-02-06-19-47-12-991-2.jpg" sizes="32x32" type="image/jpeg">
    <meta property="og:type" content="Nonton" />
    <meta property="og:title" content="Seputar Link Videy" />
    <meta property="og:description" content="Tempat nonton anu-anu" />
    <meta property="og:image" content="https://i.ibb.co.com/sdyjjS3s/Picsart-26-02-06-19-47-12-991-2.jpg" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a;
            margin: 0; display: flex; flex-direction: column; align-items: center;
            justify-content: flex-start; min-height: 100vh; overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }
        body.dark-mode { background-color: #050505; color: #e5e5e5; }
        body.dark-mode .wa-modal-content { background-color: #1e1e1e; border-color: #333; color: #fff; }
        body.dark-mode .step-num { background: #333; color: #fff; }
        body.dark-mode textarea.wa-textarea { background-color: #1e293b; border-color: #334155; color: #ffffff; }
        body.dark-mode .btn-icon-only, body.dark-mode .btn-server { background: #1e293b; border-color: #334155; color: #f8fafc; }
        body.dark-mode .server-dropdown { background: #1e293b; border-color: #334155; }
        body.dark-mode .server-item { color: #cbd5e1; border-bottom-color: #334155; }
        body.dark-mode .server-item:hover { background: #334155; color: #fff; }
        body.dark-mode .server-item.active { background: #1e3a8a; color: #fff; }

        #content-wrapper { width: 95%; max-width: 854px; display: flex; flex-direction: column; align-items: center; z-index: 10; padding-bottom: 50px; margin-top: 10px; }
        .player-container { width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 12px; overflow: hidden; position: relative; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); z-index: 20; display: flex; align-items: center; justify-content: center; }
        video, iframe { width: 100%; height: 100%; object-fit: contain; outline: none; display: block; border: none; }

        #embed-loader { position: absolute; inset: 0; background: #000; z-index: 15; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255, 255, 255, 0.1); border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #status-message { color: #9ca3af; font-weight: 500; margin-top: 10px; }

        #ad-overlay { position: absolute; inset: 0; z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.75); backdrop-filter: blur(5px); cursor: pointer; color: #ffffff; }
        .lock-title { font-size: 16px; font-weight: 700; margin-bottom: 24px; text-align: center; text-transform: uppercase; letter-spacing: 1px; color: #f8fafc; text-shadow: 0 2px 4px rgba(0,0,0,0.5); padding: 0 15px; line-height: 1.4; }
        .lock-title span { color: #3b82f6; }
        .fake-play-btn { width: 75px; height: 75px; background: rgba(37, 99, 235, 0.95); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; box-shadow: 0 0 25px rgba(37, 99, 235, 0.6); animation: pulse 2s infinite; }
        .fake-play-btn svg { width: 36px; height: 36px; transform: translateX(2px); }
        .lock-counter { margin-top: 24px; font-size: 15px; font-weight: 600; background: rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(37, 99, 235, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); } }

        #tools-container { width: 100%; display: flex; flex-direction: row; align-items: flex-start; margin-top: 12px; z-index: 30; position: relative; }
        .tools-left { display: flex; gap: 5px; margin-right: auto; }
        .btn-icon-only { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #cbd5e1; background: #ffffff; color: #0f172a; transition: all 0.2s; }
        .server-wrapper { position: relative; display: none; margin-left: auto; }
        .btn-server { height: 42px; padding: 0 16px; border-radius: 10px; border: 1px solid #cbd5e1; background: #ffffff; color: #0f172a; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; font-size: 13px; cursor: pointer; }
        .server-dropdown { position: absolute; top: 50px; right: 0; background: #fff; border: 1px solid #cbd5e1; border-radius: 10px; width: 140px; display: none; flex-direction: column; overflow: hidden; z-index: 100; }
        .server-dropdown.show { display: flex; }
        .server-item { padding: 10px 14px; font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 1px solid #f1f5f9; }
        
        #wa-modal { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(4px); align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
        #wa-modal.open { display: flex; opacity: 1; }
        .wa-modal-content { background: #fff; width: 90%; max-width: 380px; border-radius: 16px; padding: 24px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body data-version="v5.3-KV-AGRESSIVE-ADS">

<div id="wa-modal">
    <div class="wa-modal-content">
        <h3 class="text-lg font-bold mb-4">Lapor / Request</h3>
        <textarea id="wa-text-input" class="wa-textarea w-full p-2 border rounded" placeholder="Pesan tambahan..."></textarea>
        <div class="flex gap-2 mt-4">
            <button class="flex-1 p-2 border rounded" onclick="toggleWaModal()">Tutup</button>
            <button class="flex-1 p-2 bg-green-500 text-white rounded" onclick="redirectToWa()">Kirim</button>
        </div>
    </div>
</div>

<div id="content-wrapper">
    <div class="player-container">
        <div id="ad-overlay" onclick="processGateClick()">
            <div class="lock-title">Klik Play <span>5 Kali</span><br>Untuk Membuka Video</div>
            <div class="fake-play-btn"><svg viewBox="0 0 24 24" fill="currentColor" width="36"><path d="M4.5 5.653c0-1.426 1.529-2.33 2.779-1.643l11.54 6.348c1.295.712 1.295 2.573 0 3.285L7.28 19.991c-1.25.687-2.779-.217-2.779-1.643V5.653z"/></svg></div>
            <div class="lock-counter" id="lock-counter-text">0 / 5</div>
        </div>
        <div id="embed-loader"><div class="spinner"></div><p id="status-message" class="hidden"></p></div>
        <div id="native-player-wrapper" style="width:100%; height:100%; display:block;"><video id="player" controls playsinline style="width:100%; height:100%;"></video></div>
        <iframe id="iframe-player" allowfullscreen style="display:none; width:100%; height:100%; border:none;"></iframe>
    </div>

    <div id="tools-container">
        <div class="tools-left">
            <button class="btn-icon-only" onclick="toggleTheme()">🌓</button>
            <button class="btn-icon-only" onclick="executeDownload()">⬇️</button>
            <button class="btn-icon-only" onclick="toggleWaModal()">💬</button>
        </div>
        <div id="server-group" class="server-wrapper">
            <button class="btn-server" onclick="toggleServerMenu()"><span id="current-server-name">Server 1</span></button>
            <div id="server-list" class="server-dropdown"></div>
        </div>
    </div>
</div>

<script>
    let videoId, videoData = null, isUnlocked = false;
    const ADS = ["https://omg10.com/4/10390860", "https://fishermanwithavenge.com/bmaye227ji?key=21143f6352edf65a6b64615e9bb37bb9"];

    // 1. AUTO APPEND IP KE URL (Cuma buat domain lu)
    async function autoIp() {
        const p = new URLSearchParams(window.location.search);
        videoId = p.get('id');
        if (!p.has('ip')) {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const d = await r.json();
                p.set('ip', d.ip);
                window.history.replaceState({}, '', window.location.pathname + '?' + p.toString());
            } catch (e) {}
        }
    }

    // 2. LOGIKA IKLAN AGRESIF (TAB BARU + REDIRECT)
    function processGateClick() {
        let key = "gate_" + videoId;
        let c = parseInt(localStorage.getItem(key) || "0");
        if (c < 5) {
            let ad1 = ADS[c % 2];
            let ad2 = ADS[(c + 1) % 2];
            c++;
            localStorage.setItem(key, c);
            document.getElementById('lock-counter-text').innerText = c + " / 5";

            if (c >= 5) {
                window.open(ad1, '_blank'); // Tab baru iklan terakhir
                document.getElementById('ad-overlay').style.display = 'none';
                isUnlocked = true;
                if(videoId) fetchData();
            } else {
                window.open(ad1, '_blank'); // Tab baru iklan
                window.location.href = ad2; // Halaman utama jadi iklan (Redirect)
            }
        }
    }

    async function fetchData() {
        document.getElementById('embed-loader').style.display = 'flex';
        try {
            const r = await fetch(`/api/video?id=${videoId}`);
            videoData = await r.json();
            setupSrv(videoData.servers);
            play(0);
        } catch (e) {
            document.getElementById('status-message').innerText = "Gagal load video";
            document.getElementById('status-message').classList.remove('hidden');
        }
    }

    function setupSrv(s) {
        if(!s || s.length < 2) return;
        const l = document.getElementById('server-list'); l.innerHTML = '';
        s.forEach((srv, i) => {
            const d = document.createElement('div');
            d.className = 'server-item'; d.innerText = "Server " + (i+1);
            d.onclick = () => { play(i); document.getElementById('server-list').classList.remove('show'); };
            l.appendChild(d);
        });
        document.getElementById('server-group').style.display = 'block';
    }

    function play(i) {
        const s = videoData.servers[i];
        document.getElementById('current-server-name').innerText = "Server " + (i+1);
        const v = document.getElementById('player'), f = document.getElementById('iframe-player'), w = document.getElementById('native-player-wrapper');
        w.style.display = 'none'; f.style.display = 'none'; f.src = ""; v.src = "";
        
        setTimeout(() => {
            if(s.type === 'embed') { f.src = s.url; f.style.display = 'block'; }
            else if(s.type === 'm3u8') {
                w.style.display = 'block';
                if(Hls.isSupported()){ const h = new Hls(); h.loadSource(s.url); h.attachMedia(v); }
                else v.src = s.url;
                v.play().catch(()=>{});
            } else { w.style.display = 'block'; v.src = s.url; v.play().catch(()=>{}); }
            document.getElementById('embed-loader').style.display = 'none';
        }, 300);
    }

    // DOWNLOAD BERSIH (TANPA IP)
    function executeDownload() {
        if(videoData && videoData.download) window.open(videoData.download, '_blank');
    }

    (async function init() {
        await autoIp();
        if(!videoId) return;
        let c = parseInt(localStorage.getItem("gate_" + videoId) || "0");
        if(c >= 5) { document.getElementById('ad-overlay').style.display = 'none'; isUnlocked = true; fetchData(); }
        else { document.getElementById('lock-counter-text').innerText = c + " / 5"; document.getElementById('embed-loader').style.display = 'none'; }
    })();

    function toggleTheme() { document.body.classList.toggle('dark-mode'); localStorage.setItem('theme', document.body.classList.contains('dark-mode')?'dark':'light'); }
    if(localStorage.getItem('theme')==='dark') document.body.classList.add('dark-mode');
    function toggleServerMenu() { document.getElementById('server-list').classList.toggle('show'); }
    function toggleWaModal() { document.getElementById('wa-modal').classList.toggle('open'); }
    function redirectToWa() { window.open(`https://wa.me/6285126450524?text=${encodeURIComponent("Lapor: "+document.getElementById('wa-text-input').value+"\nURL: "+window.location.href)}`); }
</script>
</body>
</html>

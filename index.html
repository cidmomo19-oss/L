<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tap to Unlock!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #ffffff; overflow: hidden; user-select: none; }
        .tap-area { 
            width: 200px; height: 200px; 
            background: linear-gradient(145deg, #ffffff, #f0f0f0);
            box-shadow:  20px 20px 60px #d9d9d9, -20px -20px 60px #ffffff;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.1s; position: relative;
        }
        .tap-area:active { transform: scale(0.9); box-shadow: inset 20px 20px 60px #d9d9d9, inset -20px -20px 60px #ffffff; }
        .progress-ring { transform: rotate(-90deg); transform-origin: 50% 50%; }
        .circle-bg { fill: none; stroke: #eee; stroke-width: 8; }
        .circle-progress { fill: none; stroke: #3b82f6; stroke-width: 8; stroke-dasharray: 565; stroke-dashoffset: 565; transition: stroke-dashoffset 0.3s; }
        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen text-gray-800">

    <!-- Header Progress -->
    <div class="absolute top-10 text-center">
        <h1 class="text-4xl font-black tracking-tighter text-blue-600 mb-2">TAP-TAP</h1>
        <p class="text-gray-400 text-sm font-semibold tracking-widest">LEVEL <span id="level-display">1</span> / 10</p>
    </div>

    <!-- Main Game Area -->
    <div class="relative">
        <!-- SVG Progress Circle -->
        <svg class="absolute -top-[10px] -left-[10px]" width="220" height="220">
            <circle class="circle-bg" cx="110" cy="110" r="90"></circle>
            <circle id="ring" class="circle-progress" cx="110" cy="110" r="90"></circle>
        </svg>

        <!-- Tap Button -->
        <div id="tapBtn" class="tap-area floating" onclick="handleTap()">
            <div class="text-center">
                <span class="text-5xl">👆</span>
                <p class="text-xs font-bold text-gray-400 mt-2">KETUK</p>
            </div>
        </div>
    </div>

    <p class="mt-12 text-gray-400 text-sm text-center px-6">Ketuk tombol di atas untuk membuka link asli.</p>

    <!-- Final Button (Hidden) -->
    <div id="final-area" class="hidden absolute inset-0 bg-white flex flex-col items-center justify-center z-50">
        <h2 class="text-3xl font-black text-green-600 mb-6">SUKSES!</h2>
        <a id="targetLink" href="#" class="px-8 py-4 bg-black text-white rounded-2xl font-bold text-xl shadow-2xl hover:scale-105 transition">
            BUKA LINK ASLI 🚀
        </a>
    </div>

<script>
    // --- SETTING IKLAN DISINI ---
    // Link ini akan terbuka di tab lama setiap user ngetap
    const AD_URL = "https://google.com"; // Ganti dengan Direct Link Adsterra/Monetag lu
    
    // Logic
    const MAX_LEVEL = 10;
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    
    // Ambil level dari URL Hash (biar tidak perlu database)
    // Contoh: domain.com/?id=123#level=3
    let currentLevel = parseInt(location.hash.replace('#level=', '')) || 1;

    // Update UI Awal
    updateUI();

    function updateUI() {
        document.getElementById('level-display').innerText = currentLevel;
        
        // Update Progress Ring Circle
        const circle = document.getElementById('ring');
        const circumference = 565;
        const offset = circumference - (currentLevel / MAX_LEVEL) * circumference;
        circle.style.strokeDashoffset = offset;

        // Cek jika sudah selesai
        if (currentLevel > MAX_LEVEL) {
            finishGame();
        }
    }

    function handleTap() {
        if (currentLevel >= MAX_LEVEL) return;

        // 1. Siapkan URL untuk Tab Baru (Level Selanjutnya)
        const nextLevel = currentLevel + 1;
        const nextUrl = window.location.origin + window.location.search + "#level=" + nextLevel;

        // 2. Buka Tab Baru dengan Level Selanjutnya
        // (Browser modern membolehkan window.open jika di dalam event onclick)
        const newWindow = window.open(nextUrl, '_blank');

        // 3. Jika Tab Baru berhasil dibuka, ubah Tab Lama jadi Iklan
        if (newWindow) {
            newWindow.focus();
            window.location.href = AD_URL;
        } else {
            // Fallback jika popup blocker aktif: redirect aja di tab ini (tapi progress hilang/reset)
            // Atau paksa user allow popup
            alert("Izinkan Pop-up untuk melanjutkan game!");
        }
    }

    async function finishGame() {
        // Tampilkan layar finish
        document.getElementById('final-area').classList.remove('hidden');
        
        // Ambil link asli dari KV
        if(id) {
            try {
                const req = await fetch(`/api/get?id=${id}`);
                const res = await req.json();
                if(res.url) {
                    document.getElementById('targetLink').href = res.url;
                } else {
                    alert("Link kadaluarsa/tidak ditemukan");
                }
            } catch (e) {}
        }
    }

    // Supaya user di tab baru langsung dapat UI terupdate
    window.onload = updateUI;

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="unsafe-url" />
    
    <title>Seputar Link Videy</title>

    <meta name="theme-color" id="meta-theme" content="#f8fafc">
    <link rel="icon" href="https://i.ibb.co.com/sdyjjS3s/Picsart-26-02-06-19-47-12-991-2.jpg" sizes="32x32" type="image/jpeg">

    <!-- LIBRARY -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        body.dark-mode { background-color: #050505; color: #e5e5e5; }
        
        /* Dark Mode Overrides */
        body.dark-mode .wa-modal-content { background-color: #1e1e1e; border-color: #333; color: #fff; }
        body.dark-mode .step-num { background: #333; color: #fff; }
        body.dark-mode .btn-icon-only, body.dark-mode .btn-server { background: #1e293b; border-color: #334155; color: #f8fafc; }
        body.dark-mode .server-dropdown { background: #1e293b; border-color: #334155; }
        body.dark-mode .server-item { color: #cbd5e1; border-bottom-color: #334155; }
        body.dark-mode .server-item:hover { background: #334155; color: #fff; }

        #content-wrapper { width: 95%; max-width: 854px; display: flex; flex-direction: column; align-items: center; z-index: 10; padding-bottom: 50px; margin-top: 10px; }
        
        .player-container {
            width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 12px; 
            overflow: hidden; position: relative; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 20; display: flex; align-items: center; justify-content: center;
        }
        video, iframe { width: 100%; height: 100%; object-fit: contain; border: none; }

        /* GATE */
        #video-gate {
            position: absolute; inset: 0; z-index: 50; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(5px); cursor: pointer; color: #fff;
        }
        .play-trigger {
            width: 70px; height: 70px; background: #2563eb; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(37,99,235,0.6); animation: pulse 2s infinite;
        }
        .gate-counter { margin-top: 20px; font-weight: 700; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(37, 99, 235, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); } }

        /* TOOLBAR */
        #tools-container { width: 100%; display: flex; margin-top: 12px; position: relative; }
        .btn-icon-only, .btn-server {
            height: 42px; border-radius: 10px; border: 1px solid #cbd5e1; 
            background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .btn-icon-only { width: 42px; margin-right: 8px; }
        .btn-server { padding: 0 16px; font-size: 13px; font-weight: 600; margin-left: auto; gap: 8px; }
        
        .server-dropdown {
            position: absolute; top: 50px; right: 0; background: #fff; border: 1px solid #cbd5e1; 
            border-radius: 10px; width: 140px; display: none; flex-direction: column; z-index: 100;
        }
        .server-dropdown.show { display: flex; }
        .server-item { padding: 10px; font-size: 13px; cursor: pointer; border-bottom: 1px solid #f1f5f9; }
        
        .icon-sun { display: none; } .icon-moon { display: block; }
        body.dark-mode .icon-sun { display: block; } body.dark-mode .icon-moon { display: none; }

        /* OVERLAY POST-AD */
        #post-ad-overlay { position: absolute; inset: 0; z-index: 45; display: none; cursor: pointer; background: transparent; }
        
        /* WA MODAL */
        #wa-modal { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        #wa-modal.open { display: flex; }
        .wa-modal-content { background: #fff; width: 90%; max-width: 380px; border-radius: 16px; padding: 20px; }
        .wa-textarea { width: 100%; border: 1px solid #ccc; padding: 8px; border-radius: 8px; margin: 10px 0; }
        .btn-wa-go { background: #22c55e; color: #fff; padding: 8px 16px; border-radius: 8px; width: 100%; }
    </style>
</head>
<body data-version="v51.0-STRICT-TIME-CHECK">

<!-- WA MODAL -->
<div id="wa-modal">
    <div class="wa-modal-content">
        <h3 class="font-bold mb-4">Lapor Masalah</h3>
        <textarea id="wa-text-input" class="wa-textarea" placeholder="Detail masalah..."></textarea>
        <button class="btn-wa-go" onclick="redirectToWa()">Kirim ke Admin</button>
        <button style="margin-top:10px; width:100%; color:#666;" onclick="document.getElementById('wa-modal').classList.remove('open')">Tutup</button>
    </div>
</div>

<div id="content-wrapper">
    <div class="player-container">
        <!-- GATE (3x Klik) -->
        <div id="video-gate" onclick="processGateClick()">
            <div style="font-weight:700; text-align:center; margin-bottom:15px;">Klik Play <span style="color:#3b82f6;">3 Kali</span><br>Untuk Membuka Video</div>
            <div class="play-trigger">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </div>
            <div class="gate-counter" id="counter-display">0 / 3</div>
        </div>

        <!-- OVERLAY POST-AD (Duplikat Tab) -->
        <div id="post-ad-overlay" onclick="processPostAdClick()"></div>

        <!-- PLAYER -->
        <div id="native-player-wrapper" style="width:100%; height:100%; display:none;">
            <video id="player" controls playsinline preload="none" style="width:100%; height:100%;"></video>
        </div>
        <iframe id="iframe-player" allowfullscreen style="display:none; width:100%; height:100%; border:none;"></iframe>
    </div>

    <div id="tools-container">
        <button class="btn-icon-only" onclick="toggleTheme()">
            <svg class="icon-moon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path></svg>
            <svg class="icon-sun" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
        </button>
        <button class="btn-icon-only" onclick="document.getElementById('wa-modal').classList.add('open')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
        </button>

        <div id="server-group" style="margin-left:auto; position:relative; display:none;">
            <button class="btn-server" onclick="document.getElementById('server-list').classList.toggle('show')">
                <span id="current-server-name">Server</span>
                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </button>
            <div id="server-list" class="server-dropdown"></div>
        </div>
    </div>
</div>

<script>
    // --- KONFIGURASI ---
    const AD_LINKS = [
        "https://omg10.com/4/10390860", 
        "https://fishermanwithavenge.com/bmaye227ji?key=21143f6352edf65a6b64615e9bb37bb9" 
    ];
    const MAX_GATE_CLICKS = 3;
    const MAX_POST_ADS = 2; 
    const COOLDOWN_TIME = 3000; // 3 Detik (Min waktu di halaman iklan)
    const EXPIRY_TIME = 60 * 60 * 1000; // 1 Jam

    // GLOBAL VARS
    let servers = [];
    let cleanId = "";
    
    // --- STATE MANAGEMENT ---
    function getSaveKey() { return "vid_state_" + (cleanId || "home"); }
    
    function getState() {
        try {
            let s = JSON.parse(localStorage.getItem(getSaveKey()));
            if (s && (Date.now() - s.time < EXPIRY_TIME)) return s;
        } catch(e) {}
        // pendingAction: 'gate' | 'post' | null
        // lastClickTime: Kapan user ngeklik tombol (untuk dihitung saat kembali)
        return { gate: 0, post: 0, time: Date.now(), pendingAction: null, lastClickTime: 0 };
    }
    
    function saveState(s) {
        s.time = Date.now(); // Perbarui waktu aktif
        localStorage.setItem(getSaveKey(), JSON.stringify(s));
    }

    // --- CHECK COOLDOWN SAAT HALAMAN DIMUAT (USER KEMBALI) ---
    function checkCooldownOnLoad() {
        let s = getState();
        
        // Jika ada status PENDING (artinya user habis ngeklik dan balik lagi)
        if (s.pendingAction) {
            let diff = Date.now() - s.lastClickTime; // Hitung selisih waktu
            
            if (diff >= COOLDOWN_TIME) {
                // Lolos waktu tunggu -> Tambahkan Counter
                if (s.pendingAction === 'gate' && s.gate < MAX_GATE_CLICKS) {
                    s.gate++;
                } else if (s.pendingAction === 'post' && s.post < MAX_POST_ADS) {
                    s.post++;
                }
            } else {
                // Kecepetan -> GAK NAMBAH (Silent fail)
            }

            // Reset status pending
            s.pendingAction = null;
            saveState(s);
        }
    }

    // --- UI UPDATE ---
    function updateUI() {
        let s = getState();
        const gate = document.getElementById('video-gate');
        const overlay = document.getElementById('post-ad-overlay');
        const counter = document.getElementById('counter-display');

        if (s.gate >= MAX_GATE_CLICKS) {
            gate.style.display = 'none';
            // Logic Overlay Iklan Duplikat
            overlay.style.display = (s.post < MAX_POST_ADS) ? 'block' : 'none';
        } else {
            gate.style.display = 'flex';
            overlay.style.display = 'none';
            counter.innerText = s.gate + " / " + MAX_GATE_CLICKS;
        }
    }

    // --- LOGIC GATE (IMMEDIATE REDIRECT) ---
    function processGateClick() {
        let s = getState();
        
        // Jangan proses jika sudah max
        if (s.gate >= MAX_GATE_CLICKS) return;

        let l1 = AD_LINKS[s.gate % AD_LINKS.length]; // Iklan Tab Baru
        let l2 = AD_LINKS[(s.gate + 1) % AD_LINKS.length]; // Iklan Tab Ini

        // SET PENDING MODE (Belum nambah counter)
        s.pendingAction = 'gate';
        s.lastClickTime = Date.now();
        saveState(s);

        // EKSEKUSI IKLAN LANGSUNG
        window.open(l1, '_blank'); // 1. Tab Baru Iklan
        window.location.href = l2; // 2. Tab Lama Iklan (Langsung)
    }

    // --- LOGIC POST AD (DUPLIKAT TAB - IMMEDIATE REDIRECT) ---
    function processPostAdClick() {
        let s = getState();

        if (s.post >= MAX_POST_ADS) return;

        let adLink = AD_LINKS[s.post % AD_LINKS.length];
        
        // SET PENDING MODE
        s.pendingAction = 'post';
        s.lastClickTime = Date.now();
        saveState(s);
        
        // EKSEKUSI
        // 1. Buka Halaman Video INI di Tab Baru
        window.open(window.location.href, '_blank').focus();
        
        // 2. Ubah Tab Lama jadi Iklan
        window.location.href = adLink;
    }

    // --- INIT ---
    async function init() {
        const p = new URLSearchParams(window.location.search);
        let id = p.get('id');
        if(!id) {
            document.getElementById('video-gate').style.display = 'none';
            return;
        }

        cleanId = id.endsWith('.mp4') ? id.slice(0, -4) : id;
        
        // CEK COOLDOWN DULUAN SEBELUM RENDER UI
        checkCooldownOnLoad();
        updateUI(); 

        try {
            // IP Checker
            fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>{
                let u = new URL(window.location); u.searchParams.set('ip', d.ip);
                window.history.replaceState(null, '', u);
            }).catch(()=>{});

            // Get Data Video
            const res = await fetch(`/api/get?id=${cleanId}`);
            if(!res.ok) throw new Error();
            const data = await res.json();
            servers = data.servers || [];

            if (servers.length > 0) {
                const group = document.getElementById('server-group');
                const list = document.getElementById('server-list');

                // Logic Tombol Server
                if (servers.length > 1) {
                    group.style.display = 'block';
                    list.innerHTML = "";
                    servers.forEach((srv, i) => {
                        let d = document.createElement('div');
                        d.className = 'server-item';
                        d.innerText = srv.name;
                        d.onclick = () => { list.classList.remove('show'); play(i); };
                        list.appendChild(d);
                    });
                    document.getElementById('current-server-name').innerText = servers[0].name;
                } else {
                    group.style.display = 'none';
                }

                // Jika Gate sudah terbuka, play video
                if (getState().gate >= MAX_GATE_CLICKS) play(0);
            }

        } catch(e) { console.log(e); }
    }

    function play(idx) {
        if (!servers[idx]) return;
        // Jangan putar jika Gate belum beres (Security UI)
        if (getState().gate < MAX_GATE_CLICKS) return;

        const s = servers[idx];
        const vid = document.getElementById('player');
        const ifr = document.getElementById('iframe-player');
        const wrap = document.getElementById('native-player-wrapper');

        vid.pause(); vid.removeAttribute('src'); ifr.src = "";
        wrap.style.display = 'none'; ifr.style.display = 'none';

        setTimeout(() => {
            if (s.url.toLowerCase().includes('.mp4')) {
                wrap.style.display = 'block';
                vid.src = s.url;
                vid.load();
                vid.play().catch(()=>{});
            } else {
                ifr.style.display = 'block';
                ifr.src = s.url;
            }
        }, 100);
    }

    // Helper
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }
    function redirectToWa() {
        const txt = document.getElementById('wa-text-input').value;
        const msg = `Lapor:\n${txt}\n${window.location.href}`;
        window.open(`https://wa.me/6285126450524?text=${encodeURIComponent(msg)}`, '_blank');
    }
    window.onclick = function(e) {
        if (!document.getElementById('server-group').contains(e.target)) 
            document.getElementById('server-list').classList.remove('show');
    }
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

    // Start
    init();
</script>
</body>
</html>

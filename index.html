<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="unsafe-url" />
    <title>Seputar Link Videy</title>
    <meta name="theme-color" id="meta-theme" content="#f8fafc">
    <link rel="icon" href="https://i.ibb.co.com/sdyjjS3s/Picsart-26-02-06-19-47-12-991-2.jpg" sizes="32x32" type="image/jpeg">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; overflow-x: hidden; transition: background-color 0.3s, color 0.3s; }
        body.dark-mode { background-color: #050505; color: #e5e5e5; }
        body.dark-mode .wa-modal-content { background-color: #1e1e1e; border-color: #333; color: #fff; }
        body.dark-mode .wa-modal-content h3 { color: #ffffff; }
        body.dark-mode .step-text { color: #cbd5e1; }
        body.dark-mode .step-text strong { color: #ffffff; }
        body.dark-mode .wa-input-label { color: #cbd5e1; }
        body.dark-mode .step-num { background: #333; color: #fff; }
        body.dark-mode textarea.wa-textarea { background-color: #1e293b; border-color: #334155; color: #ffffff; }
        body.dark-mode .btn-wa-cancel { color: #e2e8f0; border-color: #475569; }
        body.dark-mode .btn-wa-cancel:hover { background: #334155; }
        body.dark-mode .btn-icon-only { background: #1e293b; border-color: #334155; color: #f8fafc; }
        body.dark-mode .btn-server { background: #1e293b; border-color: #334155; color: #f8fafc; }
        body.dark-mode .server-dropdown { background: #1e293b; border-color: #334155; }
        body.dark-mode .server-item { color: #cbd5e1; border-bottom-color: #334155; }
        body.dark-mode .server-item:hover { background: #334155; color: #fff; }
        body.dark-mode .server-item.active { background: #1e3a8a; color: #fff; }

        #content-wrapper { width: 95%; max-width: 854px; display: flex; flex-direction: column; align-items: center; z-index: 10; padding-bottom: 50px; margin-top: 10px; }
        .player-container { width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 12px; overflow: hidden; position: relative; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); z-index: 20; display: flex; align-items: center; justify-content: center; }
        video, iframe { width: 100%; height: 100%; object-fit: contain; border: none; }
        #embed-loader { position: absolute; inset: 0; background: #000; z-index: 15; display: none; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255, 255, 255, 0.1); border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #video-gate { position: absolute; inset: 0; z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.75); backdrop-filter: blur(5px); cursor: pointer; color: #ffffff; font-family: 'Inter', sans-serif; }
        .gate-msg { font-size: 16px; font-weight: 700; margin-bottom: 24px; text-align: center; text-transform: uppercase; letter-spacing: 1px; color: #f8fafc; text-shadow: 0 2px 4px rgba(0,0,0,0.5); padding: 0 15px; line-height: 1.4; }
        .gate-msg span { color: #3b82f6; }
        .play-trigger { width: 75px; height: 75px; background: rgba(37, 99, 235, 0.95); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; box-shadow: 0 0 25px rgba(37, 99, 235, 0.6); transition: transform 0.1s; animation: pulse 2s infinite; }
        .play-trigger svg { width: 36px; height: 36px; transform: translateX(2px); }
        #video-gate:active .play-trigger { transform: scale(0.9); }
        .gate-counter { margin-top: 24px; font-size: 15px; font-weight: 600; background: rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(37, 99, 235, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); } }

        #tools-container { width: 100%; display: flex; flex-direction: row; align-items: flex-start; margin-top: 12px; z-index: 30; position: relative; }
        .tools-left { display: flex; gap: 5px; margin-right: auto; }
        .btn-icon-only { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #cbd5e1; background: #ffffff; color: #0f172a; transition: all 0.2s; }
        .server-wrapper { position: relative; display: none; margin-left: auto; }
        .btn-server { height: 42px; padding: 0 16px; border-radius: 10px; border: 1px solid #cbd5e1; background: #ffffff; color: #0f172a; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; font-size: 13px; cursor: pointer; }
        .server-dropdown { position: absolute; top: 50px; right: 0; background: #fff; border: 1px solid #cbd5e1; border-radius: 10px; width: 140px; display: none; flex-direction: column; overflow: hidden; z-index: 100; }
        .server-dropdown.show { display: flex; }
        .server-item { padding: 10px 14px; font-size: 13px; font-weight: 600; cursor: pointer; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .server-item:last-child { border-bottom: none; }
        .server-item.active { background: #eff6ff; color: #2563eb; }
        .icon-sun { display: none; } .icon-moon { display: block; }
        body.dark-mode .icon-sun { display: block; } body.dark-mode .icon-moon { display: none; }

        /* WA MODAL */
        #wa-modal { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(4px); align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
        #wa-modal.open { display: flex; opacity: 1; }
        .wa-modal-content { background: #fff; width: 90%; max-width: 380px; border-radius: 16px; padding: 24px; border: 1px solid #e2e8f0; transform: scale(0.95); transition: transform 0.3s ease; }
        #wa-modal.open .wa-modal-content { transform: scale(1); }
        .wa-step { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
        .step-num { width: 24px; height: 24px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #475569; flex-shrink: 0; }
        .step-text { font-size: 13px; color: #334155; line-height: 1.5; text-align: left; }
        .step-text strong { color: #0f172a; }
        .wa-input-area { margin-top: 15px; margin-bottom: 10px; }
        .wa-input-label { font-size: 12px; font-weight: 600; margin-bottom: 6px; display: block; color: #64748b; }
        .wa-textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-family: 'Inter', sans-serif; font-size: 13px; background: #f8fafc; outline: none; resize: none; height: 70px; }
        .wa-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn-wa-cancel { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; background: transparent; color: #64748b; font-weight: 600; font-size: 13px; cursor: pointer; }
        .btn-wa-go { flex: 1.5; padding: 10px; border-radius: 8px; border: none; background: #22c55e; color: #fff; font-weight: 600; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
    </style>
</head>
<body data-version="v42.0-NO-DOWNLOAD">

<!-- WA MODAL -->
<div id="wa-modal">
    <div class="wa-modal-content">
        <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
            <svg class="w-6 h-6 text-green-500" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
            </svg>
            Lapor / Request
        </h3>
        <div class="wa-step"><div class="step-num">1</div><div class="step-text"><strong>Screenshot</strong> layar jika error.</div></div>
        <div class="wa-step"><div class="step-num">2</div><div class="step-text">Tulis detail masalah atau <strong>Video</strong> request:</div></div>
        <div class="wa-input-area">
            <label class="wa-input-label">Pesan Tambahan:</label>
            <textarea id="wa-text-input" class="wa-textarea" placeholder="Contoh: Link mati / Request anu"></textarea>
        </div>
        <div class="wa-actions">
            <button class="btn-wa-cancel" onclick="toggleWaModal()">Tutup</button>
            <button class="btn-wa-go" onclick="redirectToWa()">Chat Admin</button>
        </div>
    </div>
</div>

<div id="content-wrapper">
    <div class="player-container">
        <!-- GATE (Anti-Block) -->
        <div id="video-gate" onclick="processGateClick()">
            <div class="gate-msg">Klik Play <span>5 Kali</span><br>Untuk Membuka Video</div>
            <div class="play-trigger">
                <svg viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M4.5 5.653c0-1.426 1.529-2.33 2.779-1.643l11.54 6.348c1.295.712 1.295 2.573 0 3.285L7.28 19.991c-1.25.687-2.779-.217-2.779-1.643V5.653z" clip-rule="evenodd" /></svg>
            </div>
            <div class="gate-counter" id="counter-display">0 / 5</div>
        </div>

        <div id="embed-loader"><div class="spinner"></div></div>
        
        <!-- NATIVE -->
        <div id="native-player-wrapper" style="width:100%; height:100%; display:block;">
            <video id="player" controls playsinline preload="none" style="width:100%; height:100%;"></video>
        </div>
        <!-- IFRAME -->
        <iframe id="iframe-player" allowfullscreen allow="autoplay; fullscreen" style="display:none; width:100%; height:100%; border:none;"></iframe>
    </div>

    <div id="tools-container">
        <div class="tools-left">
            <button class="btn-icon-only" onclick="toggleTheme()" title="Ganti Mode">
                <svg class="icon-moon" style="width:20px;height:20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                <svg class="icon-sun" style="width:20px;height:20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            </button>

            <!-- TOMBOL DOWNLOAD SUDAH DIHAPUS -->

            <button class="btn-icon-only" onclick="toggleWaModal()" title="Lapor Masalah">
                <svg style="width:20px;height:20px;" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
            </button>
        </div>

        <div id="server-group" class="server-wrapper">
            <button class="btn-server" onclick="toggleServerMenu()">
                <span id="current-server-name">Pilih Server</span>
                <svg style="width:14px;height:14px;" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
            </button>
            <div id="server-list" class="server-dropdown"></div>
        </div>
    </div>

<script>
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        document.getElementById('meta-theme').setAttribute('content', '#050505');
    }

    // IP CHECKER
    fetch('https://api.ipify.org?format=json')
        .then(r => r.json())
        .then(d => {
            const u = new URL(window.location);
            u.searchParams.set('ip', d.ip);
            window.history.replaceState(null, '', u);
        })
        .catch(e => console.log('IP silent fail'));

    // --- GLOBAL VARS ---
    let servers = [];
    let unlocked = false;

    // --- GATE LOGIC ---
    const LINKS = [
        "https://omg10.com/4/10390860", 
        "https://fishermanwithavenge.com/bmaye227ji?key=21143f6352edf65a6b64615e9bb37bb9" 
    ];
    const MAX = 5;
    const K_STORE = "gate_acts_" + (window.location.search || "home");

    function checkGate() {
        let c = parseInt(localStorage.getItem(K_STORE) || "0");
        const el = document.getElementById('video-gate');
        if (c >= MAX) {
            el.style.display = 'none';
            unlocked = true; 
        } else {
            el.style.display = 'flex';
            document.getElementById('counter-display').innerText = c + " / 5";
            unlocked = false; 
        }
    }

    function processGateClick() {
        let c = parseInt(localStorage.getItem(K_STORE) || "0");
        if (c < MAX) {
            let l1 = LINKS[c % 2]; 
            let l2 = LINKS[(c + 1) % 2];
            c++; 
            localStorage.setItem(K_STORE, c.toString()); 
            document.getElementById('counter-display').innerText = c + " / 5"; 

            if (c >= MAX) {
                window.open(l1, '_blank'); 
                document.getElementById('video-gate').style.display = 'none';
                unlocked = true;
                if (servers.length > 0) play(0); 
            } else {
                window.open(l1, '_blank'); 
                window.location.href = l2; 
            }
        }
    }

    // --- INIT & FETCH FROM KV ---
    async function init() {
        const p = new URLSearchParams(window.location.search);
        let id = p.get('id');

        // Jika tidak ada ID, berhenti
        if (!id) return;

        // FITUR GIMMICK .mp4 (Menghapus .mp4 sebelum request ke API)
        id = id.replace('.mp4', '');

        try {
            // Panggil API Backend (yang di-cache 1 bulan)
            const res = await fetch(`/api/get?id=${id}`);
            if (!res.ok) throw new Error('Video not found');
            
            const data = await res.json();
            
            // Isi Data dari KV
            servers = data.servers; // Array Link Utuh

            // Setup UI setelah data didapat
            checkGate();

            if (servers.length > 0) {
                const list = document.getElementById('server-list');
                const group = document.getElementById('server-group');
                
                if (servers.length > 1) {
                    group.style.display = 'block'; 
                    servers.forEach((s, i) => {
                        let d = document.createElement('div');
                        d.className = 'server-item';
                        d.innerText = s.name;
                        d.onclick = () => { document.getElementById('server-list').classList.remove('show'); play(i); };
                        list.appendChild(d);
                    });
                    document.getElementById('current-server-name').innerText = servers[0].name;
                } else {
                    group.style.display = 'block';
                    document.getElementById('current-server-name').innerText = servers[0].name;
                    group.querySelector('svg:last-child').style.display = 'none'; 
                    group.onclick = null;
                }

                if (unlocked) play(0);
            }

        } catch (error) {
            console.error(error);
        }
    }

    function play(idx) {
        if (!servers[idx] || !unlocked) return;
        
        document.querySelectorAll('.server-item').forEach((d, i) => d.classList.toggle('active', i === idx));
        document.getElementById('current-server-name').innerText = servers[idx].name;

        const vid = document.getElementById('player');
        const ifr = document.getElementById('iframe-player');
        const spin = document.getElementById('embed-loader');
        const s = servers[idx];

        spin.style.display = 'flex';
        vid.pause(); vid.removeAttribute('src'); ifr.src = "";
        document.getElementById('native-player-wrapper').style.display = 'none';
        ifr.style.display = 'none';

        setTimeout(() => {
            if (s.mode === 'embed') {
                ifr.style.display = 'block';
                ifr.src = s.url;
            } else {
                document.getElementById('native-player-wrapper').style.display = 'block';
                vid.src = s.url;
                vid.load();
                vid.play().catch(()=>{});
            }
            setTimeout(() => spin.style.display = 'none', 2000);
        }, 200);
    }

    // UI HELPER
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        document.getElementById('meta-theme').setAttribute('content', document.body.classList.contains('dark-mode') ? '#050505' : '#f8fafc');
    }
    function toggleWaModal() {
        const m = document.getElementById('wa-modal');
        if (m.classList.contains('open')) { m.classList.remove('open'); setTimeout(() => m.style.display = 'none', 300); } 
        else { m.style.display = 'flex'; m.offsetHeight; m.classList.add('open'); }
    }
    function redirectToWa() {
        const txt = document.getElementById('wa-text-input').value;
        let m = `Lapor/Request:\n\n`;
        if(txt) m += `*Pesan:* ${txt}\n\n`;
        m += `*Link:* ${window.location.href}`;
        window.open(`https://wa.me/6285126450524?text=${encodeURIComponent(m)}`, '_blank');
        toggleWaModal();
    }
    function toggleServerMenu() { document.getElementById('server-list').classList.toggle('show'); }
    window.onclick = function(e) {
        if (document.getElementById('server-group') && !document.getElementById('server-group').contains(e.target)) document.getElementById('server-list').classList.remove('show');
        if (e.target == document.getElementById('wa-modal')) toggleWaModal();
    }

    // Jalankan Init
    init();

</script>
</body>
</html>

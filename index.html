<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="unsafe-url" />
    
    <title>Video Player</title>

    <meta name="theme-color" id="meta-theme" content="#f8fafc">
    <link rel="icon" href="https://i.ibb.co.com/sdyjjS3s/Picsart-26-02-06-19-47-12-991-2.jpg" sizes="32x32" type="image/jpeg">
    
    <!-- LIBRARY -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        body.dark-mode { background-color: #050505; color: #e5e5e5; }
        /* Style Dark Mode Lainnya disederhanakan untuk efisiensi, tetap jalan */
        body.dark-mode .step-text { color: #cbd5e1; }
        body.dark-mode .btn-icon-only { background: #1e293b; border-color: #334155; color: #f8fafc; }
        body.dark-mode .btn-server { background: #1e293b; border-color: #334155; color: #f8fafc; }
        body.dark-mode .server-dropdown { background: #1e293b; border-color: #334155; }
        body.dark-mode .server-item { color: #cbd5e1; border-bottom-color: #334155; }
        body.dark-mode .server-item:hover { background: #334155; color: #fff; }

        #content-wrapper {
            width: 95%; max-width: 854px;
            display: flex; flex-direction: column; align-items: center;
            z-index: 10; padding-bottom: 50px; margin-top: 10px;
        }

        .player-container {
            width: 100%; aspect-ratio: 16 / 9;
            background: #000; border-radius: 12px; 
            overflow: hidden; position: relative; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 20; display: flex; align-items: center; justify-content: center;
        }
        
        video, iframe { width: 100%; height: 100%; object-fit: contain; border: none; }

        /* SPINNER */
        #media-loader {
            position: absolute; inset: 0; background: #000; z-index: 15; 
            display: none; align-items: center; justify-content: center;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- GATE LAYER (PENGGANTI AD OVERLAY) --- 
           Nama class diganti supaya tidak terdeteksi AdBlock */
        #gate-layer {
            position: absolute; inset: 0; z-index: 50; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); cursor: pointer;
            color: #ffffff; font-family: 'Inter', sans-serif;
            transition: opacity 0.3s;
        }
        .gate-msg {
            font-size: 16px; font-weight: 700; margin-bottom: 24px; text-align: center;
            text-transform: uppercase; letter-spacing: 1px; color: #f8fafc;
            padding: 0 15px; line-height: 1.4;
        }
        .gate-msg span { color: #3b82f6; }
        
        .start-btn {
            width: 75px; height: 75px; background: #2563eb;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: #fff; box-shadow: 0 0 25px rgba(37, 99, 235, 0.6);
            transition: transform 0.1s; animation: pulse 2s infinite;
        }
        .start-btn svg { width: 36px; height: 36px; transform: translateX(2px); }
        #gate-layer:active .start-btn { transform: scale(0.9); }
        
        .progress-badge {
            margin-top: 24px; font-size: 14px; font-weight: 600;
            background: rgba(255,255,255,0.15); padding: 6px 16px;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
        }

        /* --- TOOLBAR --- */
        #tools-container {
            width: 100%; display: flex; flex-direction: row; align-items: flex-start;
            margin-top: 12px; z-index: 30; position: relative;
        }
        .tools-left { display: flex; gap: 5px; margin-right: auto; }
        .btn-icon-only {
            width: 42px; height: 42px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            border: 1px solid #cbd5e1; background: #ffffff; color: #0f172a; transition: all 0.2s;
        }
        .server-wrapper { position: relative; display: none; margin-left: auto; }
        .btn-server {
            height: 42px; padding: 0 16px; border-radius: 10px;
            border: 1px solid #cbd5e1; background: #ffffff; color: #0f172a;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-weight: 600; font-size: 13px; cursor: pointer;
        }
        .server-dropdown {
            position: absolute; top: 50px; right: 0;
            background: #fff; border: 1px solid #cbd5e1; border-radius: 10px; width: 140px;
            display: none; flex-direction: column; overflow: hidden; z-index: 100;
        }
        .server-dropdown.show { display: flex; }
        .server-item { padding: 10px 14px; font-size: 13px; font-weight: 600; cursor: pointer; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .server-item.active { background: #eff6ff; color: #2563eb; }
        
        .icon-sun { display: none; }
        .icon-moon { display: block; }
        body.dark-mode .icon-sun { display: block; }
        body.dark-mode .icon-moon { display: none; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(37, 99, 235, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }
    </style>
</head>
<body data-version="v4.1-SAFE-MODE">

<div id="content-wrapper">
    <div class="player-container">
        
        <!-- PENGUNCI VIDEO (Nama ID disamarkan jadi #gate-layer) -->
        <div id="gate-layer" onclick="executeGateAction()">
            <div class="gate-msg">Tap Play <span>5 Kali</span><br>Untuk Memulai Stream</div>
            <div class="start-btn">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path fill-rule="evenodd" d="M4.5 5.653c0-1.426 1.529-2.33 2.779-1.643l11.54 6.348c1.295.712 1.295 2.573 0 3.285L7.28 19.991c-1.25.687-2.779-.217-2.779-1.643V5.653z" clip-rule="evenodd" />
                </svg>
            </div>
            <div class="progress-badge" id="gate-progress">0 / 5</div>
        </div>

        <div id="media-loader">
            <div class="spinner"></div>
        </div>
        
        <!-- PLAYER NATIVE -->
        <div id="native-view" style="width:100%; height:100%; display:block;">
            <video id="main-video" controls playsinline preload="none" style="width:100%; height:100%;">
                Browser error.
            </video>
        </div>

        <!-- PLAYER IFRAME -->
        <iframe id="frame-view" allowfullscreen allow="autoplay; fullscreen" style="display:none; width:100%; height:100%; border:none;"></iframe>
    </div>

    <div id="tools-container">
        <div class="tools-left">
            <button class="btn-icon-only" onclick="toggleTheme()">
                <svg class="icon-moon" style="width:20px;height:20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                <svg class="icon-sun" style="width:20px;height:20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            </button>
        </div>

        <div id="server-group" class="server-wrapper">
            <button class="btn-server" onclick="toggleServerMenu()">
                <span id="current-server-name">Pilih Server</span>
            </button>
            <div id="server-list" class="server-dropdown"></div>
        </div>
    </div>
</div>

<script>
    // --- LOAD THEME ---
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        document.getElementById('meta-theme').setAttribute('content', '#050505');
    }

    // ========================================================
    // --- SYSTEM LOGIC (OBFUSCATED) ---
    // ========================================================
    const CODE_A = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-_";
    const CODE_B = "poiuytrewqasdfghjklmnbvcxzPOIUYTREWQASDFGHJKLMNBVCXZ9876543210-_"; 

    function parseTypeA(str) {
        let res = "";
        for(let i=0; i<str.length; i++) {
            let idx = CODE_B.indexOf(str[i]);
            res += (idx !== -1) ? CODE_A[idx] : str[i];
        }
        return res;
    }

    function parseTypeB(str) {
        if (!/^\d+$/.test(str) || str.length % 2 !== 0) return str; 
        let res = "";
        for(let i=0; i<str.length; i+=2) {
            let n = parseInt(str.substring(i, i+2));
            let idx = n - 10; 
            if(idx >= 0 && idx < CODE_A.length) res += CODE_A[idx];
            else return str; 
        }
        return res;
    }

    // --- GATE KEEPER LOGIC (PENGGANTI AD LOGIC) ---
    // Menggunakan nama variabel _data_src daripada AD_LINKS agar aman
    const _data_src = [
        "https://omg10.com/4/10390860", 
        "https://fishermanwithavenge.com/bmaye227ji?key=21143f6352edf65a6b64615e9bb37bb9"
    ];
    const REQ_STEPS = 5;
    const PG_KEY = "sess_prog_" + (window.location.search || "home");

    let _is_open = false; 

    function checkGateStatus() {
        let step = parseInt(localStorage.getItem(PG_KEY) || "0");
        const layer = document.getElementById('gate-layer');
        const badge = document.getElementById('gate-progress');
        
        if (step >= REQ_STEPS) {
            layer.style.display = 'none';
            _is_open = true;
        } else {
            layer.style.display = 'flex';
            badge.innerText = step + " / " + REQ_STEPS;
            _is_open = false;
        }
    }

    function executeGateAction() {
        let step = parseInt(localStorage.getItem(PG_KEY) || "0");
        
        if (step < REQ_STEPS) {
            // Rotasi Link
            let linkCurrent = _data_src[step % _data_src.length]; 
            let linkNext = _data_src[(step + 1) % _data_src.length];

            step++; 
            localStorage.setItem(PG_KEY, step.toString()); 
            document.getElementById('gate-progress').innerText = step + " / " + REQ_STEPS; 

            // LOGIKA KLIK (Tetap agresif tapi aman)
            if (step >= REQ_STEPS) {
                // Klik terakhir: Buka tab baru, halaman ini buka video
                window.open(linkCurrent, '_blank'); 
                document.getElementById('gate-layer').style.display = 'none';
                _is_open = true;
                if (serverList.length > 0) runPlayer(0); 
            } else {
                // Klik 1-4: Buka tab baru DAN redirect halaman ini
                window.open(linkCurrent, '_blank'); 
                setTimeout(() => {
                   window.location.href = linkNext; 
                }, 100);
            }
        }
    }

    // --- PLAYER CONFIG ---
    const SRC_1 = "https://short.icu/"; 
    const SRC_2 = "https://minochinos.com/embed/"; 
    let serverList = [];

    function runPlayer(idx) {
        if (!serverList[idx]) return;
        if (!_is_open) return; // Block play if gate closed
        
        // Update UI
        document.querySelectorAll('.server-item').forEach((d, i) => {
            d.classList.toggle('active', i === idx);
        });
        document.getElementById('current-server-name').innerText = serverList[idx].name;

        const vDiv = document.getElementById('native-view');
        const vTag = document.getElementById('main-video');
        const iTag = document.getElementById('frame-view');
        const spin = document.getElementById('media-loader');
        const srv = serverList[idx];

        spin.style.display = 'flex';
        vTag.pause(); vTag.removeAttribute('src'); iTag.src = "";

        setTimeout(() => {
            if (srv.mode === 'embed') {
                vDiv.style.display = 'none';
                iTag.style.display = 'block';
                iTag.src = srv.url;
            } else {
                iTag.style.display = 'none';
                vDiv.style.display = 'block';
                vTag.src = srv.url;
                vTag.load();
                vTag.play().catch(() => {});
            }
            // Sembunyikan spinner setelah beberapa saat (karena iframe kadang tidak trigger onload)
            setTimeout(() => { spin.style.display = 'none'; }, 2000);
        }, 300);
    }

    // --- INITIALIZATION ---
    (function boot() {
        const p = new URLSearchParams(window.location.search);
        let c = 1;

        for (const [k, v] of p.entries()) {
            if (!v.trim()) continue;
            if (k.startsWith('verify')) {
                serverList.push({ name: "Server " + c++, url: SRC_2 + parseTypeB(v.trim()), mode: 'embed' });
            } else if (k.startsWith('id')) {
                serverList.push({ name: "Server " + c++, url: SRC_1 + parseTypeA(v.trim()), mode: 'embed' });
            }
        }

        checkGateStatus();

        // Setup UI Server
        const grp = document.getElementById('server-group');
        const lst = document.getElementById('server-list');

        if (serverList.length > 0) {
            if (serverList.length > 1) {
                serverList.forEach((s, i) => {
                    let div = document.createElement('div');
                    div.className = 'server-item';
                    div.innerText = s.name;
                    div.onclick = () => { lst.classList.remove('show'); runPlayer(i); };
                    lst.appendChild(div);
                });
                grp.style.display = 'block';
            } else {
                grp.style.display = 'block'; // Tetap tampilkan tapi non-aktif dropdown
                grp.onclick = null;
                document.getElementById('current-server-name').innerText = serverList[0].name;
            }

            if (_is_open) runPlayer(0);
        }
    })();

    // UI HELPER
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const dark = document.body.classList.contains('dark-mode');
        localStorage.setItem('theme', dark ? 'dark' : 'light');
        document.getElementById('meta-theme').setAttribute('content', dark ? '#050505' : '#f8fafc');
    }
    function toggleServerMenu() { 
        if(serverList.length > 1) document.getElementById('server-list').classList.toggle('show'); 
    }
    window.onclick = function(e) {
        if (!document.getElementById('server-group').contains(e.target)) {
            document.getElementById('server-list').classList.remove('show');
        }
    }
</script>
</body>
</html>

<script>
    // --- LOAD TEMA DARI MEMORY (LOCALSTORAGE) ---
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        document.getElementById('meta-theme').setAttribute('content', '#050505');
    }

    // ========================================================
    // --- KAMUS SANDI (CIPHER) UNTUK MENYEMBUNYIKAN LINK ASLI ---
    // ========================================================
    const CHAR_MAP_ASLI  = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-_";
    const CHAR_MAP_ABYSS = "poiuytrewqasdfghjklmnbvcxzPOIUYTREWQASDFGHJKLMNBVCXZ9876543210-_"; 

    // FUNGSI 1: Dekripsi Abyss (?id=)
    function decodeAbyss(fakeSlug) {
        let realId = "";
        for(let i=0; i<fakeSlug.length; i++) {
            let index = CHAR_MAP_ABYSS.indexOf(fakeSlug[i]);
            if(index !== -1) {
                realId += CHAR_MAP_ASLI[index];
            } else {
                realId += fakeSlug[i]; 
            }
        }
        return realId;
    }

    // FUNGSI 2: Dekripsi Minochinos (?verify=)
    function decodeVerify(fakeSlug) {
        if (!/^\d+$/.test(fakeSlug) || fakeSlug.length % 2 !== 0) return fakeSlug; 
        
        let realId = "";
        for(let i=0; i<fakeSlug.length; i+=2) {
            let num = parseInt(fakeSlug.substring(i, i+2));
            let index = num - 10; 
            
            if(index >= 0 && index < CHAR_MAP_ASLI.length) {
                realId += CHAR_MAP_ASLI[index];
            } else {
                return fakeSlug; 
            }
        }
        return realId;
    }
    // ========================================================


    // --- KONFIGURASI VIDEO GATE (DULUNYA AD OVERLAY) ---
    // Variable diganti namanya agar tidak dideteksi sebagai iklan
    const DATA_SRC = [
        "https://omg10.com/4/10390860", // Index 0
        "https://fishermanwithavenge.com/bmaye227ji?key=21143f6352edf65a6b64615e9bb37bb9" // Index 1
    ];
    const MAX_CLICKS = 5;
    
    // Menyimpan click unik PER-LINK berdasarkan parameter.
    const currentQuery = window.location.search || "default_page";
    // Kunci storage diubah dari 'ad_clicks' menjadi 'gate_acts'
    const storageKey = "gate_acts_" + currentQuery;

    let isVideoUnlocked = false; 

    function checkGateStatus() {
        let clicks = parseInt(localStorage.getItem(storageKey) || "0");
        const overlay = document.getElementById('video-gate');
        const counterText = document.getElementById('counter-display');
        
        if (clicks >= MAX_CLICKS) {
            overlay.style.display = 'none';
            isVideoUnlocked = true; // Kunci terbuka
        } else {
            overlay.style.display = 'flex';
            counterText.innerText = clicks + " / 5";
            isVideoUnlocked = false; // Masih dikunci
        }
    }

    function processGateClick() {
        let clicks = parseInt(localStorage.getItem(storageKey) || "0");
        
        if (clicks < MAX_CLICKS) {
            
            // Bergantian Iklan: Index 0, 1, 0, 1
            let adUrl1 = DATA_SRC[clicks % 2]; 
            let adUrl2 = DATA_SRC[(clicks + 1) % 2];

            clicks++; 
            localStorage.setItem(storageKey, clicks.toString()); 
            document.getElementById('counter-display').innerText = clicks + " / 5"; 

            // LOGIKA IKLAN BARU: DOBEL (Tab Baru Buka Iklan, Tab Lama Juga Jadi Iklan)
            // Khusus klik ke-5 (terakhir), tab lama biarkan buka video, tab baru yg iklan.
            if (clicks >= MAX_CLICKS) {
                window.open(adUrl1, '_blank'); // Buka 1 iklan terakhir di tab baru
                
                // Unload overlay dan play video langsung di tab ini (tanpa perlu user pencet Back)
                document.getElementById('video-gate').style.display = 'none';
                isVideoUnlocked = true;
                if (availableServers.length > 0) playVideo(0); 
            } else {
                // Untuk klik 1, 2, 3, dan 4: AGGRESIF DOBEL IKLAN
                window.open(adUrl1, '_blank'); // Tab Baru = Iklan
                window.location.href = adUrl2; // Tab Lama = Iklan (Ngeredirect)
            }
        }
    }

    // --- TOGGLE THEME ---
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        
        // Simpan ke memory
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        
        const meta = document.getElementById('meta-theme');
        meta.setAttribute('content', isDark ? '#050505' : '#f8fafc');
    }

    // --- MODAL LOGIC ---
    function toggleWaModal() {
        const modal = document.getElementById('wa-modal');
        if (modal.classList.contains('open')) { modal.classList.remove('open'); setTimeout(() => modal.style.display = 'none', 300); } 
        else { modal.style.display = 'flex'; modal.offsetHeight; modal.classList.add('open'); }
    }
    
    function redirectToWa() {
        const phone = "6285126450524";
        const url = window.location.href; // Akan mendapatkan FULL URL beserta ?verify= dan &id=
        const userText = document.getElementById('wa-text-input').value;
        
        let msg = `Halo Admin, saya mau lapor/request.\n\n`;
        if(userText.trim() !== "") { msg += `*Pesan:* ${userText}\n\n`; }
        msg += `*Link Video:* ${url}`;
        
        // encodeURIComponent penting agar lambang '&' di URL tidak membuat link terputus di WA
        const encodedMsg = encodeURIComponent(msg);
        
        window.open(`https://wa.me/${phone}?text=${encodedMsg}`, '_blank');
        toggleWaModal();
    }

    // --- SERVER UI ---
    function toggleServerMenu() { document.getElementById('server-list').classList.toggle('show'); }
    document.addEventListener('click', function(e) {
        if (document.getElementById('server-group') && !document.getElementById('server-group').contains(e.target)) {
            document.getElementById('server-list').classList.remove('show');
        }
    });
    window.onclick = function(event) {
        if (event.target == document.getElementById('wa-modal')) toggleWaModal();
    }

    // --- KONFIGURASI PLAYER EMBED HYBRID ---
    const ABYSS_BASE = "https://short.icu/"; // URL Embed Abyss
    const MINOCHINOS_BASE = "https://minochinos.com/embed/"; // URL Embed Minochinos

    let availableServers = [];
    
    // --- INITIALIZE LOGIC ---
    (function initVideoLogic() {
        const params = new URLSearchParams(window.location.search);
        let serverCount = 1;

        // Loop ke semua parameter secara otomatis
        for (const [key, value] of params.entries()) {
            if (!value.trim()) continue;

            if (key.startsWith('verify')) {
                // TERJEMAHKAN DARI SANDI ANGKA
                let realId = decodeVerify(value.trim()); 
                addVideoSource(realId, "Server " + serverCount, 'minochinos');
                serverCount++;
            }
            else if (key.startsWith('id')) {
                // TERJEMAHKAN DARI SANDI HURUF ACAK
                let realId = decodeAbyss(value.trim()); 
                addVideoSource(realId, "Server " + serverCount, 'abyss');
                serverCount++;
            }
        }

        // Jalankan pengecekan Gate (dulu Ad Overlay)
        checkGateStatus();

        // --- SETUP DROPDOWN UI & PLAY ---
        if (availableServers.length > 0) {
            setupServerUI();
            
            // HANYA PUTAR VIDEO JIKA KUNCI SUDAH TERBUKA
            if (isVideoUnlocked) {
                playVideo(0);
            }
        }
    })();

    function addVideoSource(val, name, type) {
        let finalSource = "";
        let mode = "embed"; 
        
        if(val.includes('http')) {
            finalSource = val;
        } else {
            if (type === 'minochinos') {
                finalSource = MINOCHINOS_BASE + val;
            } else if (type === 'abyss') {
                finalSource = ABYSS_BASE + val;
            }
        }

        availableServers.push({ name: name, url: finalSource, mode: mode });
    }

    function setupServerUI() {
        const listEl = document.getElementById('server-list');
        const groupEl = document.getElementById('server-group');
        
        if (availableServers.length > 1) {
            groupEl.style.display = 'block'; 
            availableServers.forEach((srv, idx) => {
                const item = document.createElement('div');
                item.className = 'server-item';
                item.innerText = srv.name;
                item.onclick = function() {
                    document.getElementById('server-list').classList.remove('show');
                    playVideo(idx);
                };
                listEl.appendChild(item);
            });
            document.getElementById('current-server-name').innerText = availableServers[0].name;
            updateActiveUI(0);
        } else if (availableServers.length === 1) {
            groupEl.style.display = 'block';
            document.getElementById('current-server-name').innerText = availableServers[0].name;
            groupEl.querySelector('svg:last-child').style.display = 'none'; 
            groupEl.onclick = null;
        } else {
            groupEl.style.display = 'none';
        }
    }

    function updateActiveUI(idx) {
        document.querySelectorAll('.server-item').forEach((d, i) => {
            if(i === idx) d.classList.add('active');
            else d.classList.remove('active');
        });
        if(availableServers[idx]) {
            document.getElementById('current-server-name').innerText = availableServers[idx].name;
        }
    }

    // --- PEMUTAR HYBRID (VIDEO / IFRAME) ---
    function playVideo(index) {
        if (!availableServers[index]) return;

        // PENCEGAHAN KETAT: Jangan muat video kalau kunci belum kebuka
        if (!isVideoUnlocked) return;
        
        const srv = availableServers[index];
        updateActiveUI(index);

        const videoContainer = document.getElementById('native-player-wrapper');
        const videoEl = document.getElementById('player');
        const iframeEl = document.getElementById('iframe-player');
        const loader = document.getElementById('embed-loader');

        loader.style.display = 'flex';

        videoEl.pause();
        videoEl.removeAttribute('src'); 
        iframeEl.src = "";

        setTimeout(() => {
            if (srv.mode === 'embed') {
                videoContainer.style.display = 'none';
                iframeEl.style.display = 'block';
                iframeEl.src = srv.url;
                setTimeout(() => { loader.style.display = 'none'; }, 2000);
            } else {
                iframeEl.style.display = 'none';
                videoContainer.style.display = 'block';
                videoEl.src = srv.url;
                videoEl.load();
                videoEl.play().catch(e => console.log("Autoplay blocked"));
                videoEl.onloadeddata = function() { loader.style.display = 'none'; };
                setTimeout(() => { loader.style.display = 'none'; }, 2500);
            }
        }, 200);
    }
</script>
</body>
</html>

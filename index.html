<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="unsafe-url" />
    
    <title>Seputar Link Videy</title>

    <meta name="theme-color" id="meta-theme" content="#f8fafc">
    <link rel="icon" href="https://i.ibb.co.com/sdyjjS3s/Picsart-26-02-06-19-47-12-991-2.jpg" sizes="32x32" type="image/jpeg">
    
    <!-- LIBRARY -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script> <!-- Diperlukan untuk M3U8 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS 100% SAMA SEPERTI KODE ASLI V40.1 -->
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* --- DARK MODE CONFIG --- */
        body.dark-mode { background-color: #050505; color: #e5e5e5; }
        body.dark-mode .wa-modal-content { background-color: #1e1e1e; border-color: #333; color: #fff; }
        body.dark-mode .wa-modal-content h3 { color: #ffffff; }
        body.dark-mode .step-text { color: #cbd5e1; }
        body.dark-mode .step-text strong { color: #ffffff; }
        body.dark-mode .wa-input-label { color: #cbd5e1; }
        body.dark-mode .step-num { background: #333; color: #fff; }
        body.dark-mode textarea.wa-textarea { background-color: #1e293b; border-color: #334155; color: #ffffff; }
        body.dark-mode textarea.wa-textarea::placeholder { color: #94a3b8; }
        body.dark-mode .btn-wa-cancel { color: #e2e8f0; border-color: #475569; }
        body.dark-mode .btn-wa-cancel:hover { background: #334155; }
        body.dark-mode .btn-icon-only { background: #1e293b; border-color: #334155; color: #f8fafc; }
        body.dark-mode .btn-server { background: #1e293b; border-color: #334155; color: #f8fafc; }
        body.dark-mode .server-dropdown { background: #1e293b; border-color: #334155; }
        body.dark-mode .server-item { color: #cbd5e1; border-bottom-color: #334155; }
        body.dark-mode .server-item:hover { background: #334155; color: #fff; }
        body.dark-mode .server-item.active { background: #1e3a8a; color: #fff; }

        /* WRAPPER */
        #content-wrapper {
            width: 95%; max-width: 854px;
            display: flex; flex-direction: column; align-items: center;
            z-index: 10; padding-bottom: 50px; margin-top: 10px;
        }

        /* PLAYER CONTAINER */
        .player-container {
            width: 100%; aspect-ratio: 16 / 9;
            background: #000; border-radius: 12px; 
            overflow: hidden; position: relative; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 20; display: flex; align-items: center; justify-content: center;
        }
        
        video, iframe { 
            width: 100%; height: 100%; 
            object-fit: contain; 
            outline: none; display: block; border: none;
        }

        /* LOADING SPINNER */
        #embed-loader {
            position: absolute; inset: 0; 
            background: #000; z-index: 15; 
            display: flex; align-items: center; justify-content: center;
        }
        .spinner {
            width: 40px; height: 40px; 
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #2563eb; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #status-message { color: #9ca3af; font-weight: 500; margin-top: 1rem; }

        /* --- VIDEO GATE (Anti-AdBlock Safe Name) --- */
        #video-gate {
            position: absolute; inset: 0; z-index: 50; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(5px); cursor: pointer;
            color: #ffffff; font-family: 'Inter', sans-serif;
        }
        .gate-msg {
            font-size: 16px; font-weight: 700; margin-bottom: 24px; text-align: center;
            text-transform: uppercase; letter-spacing: 1px; color: #f8fafc;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5); padding: 0 15px; line-height: 1.4;
        }
        .gate-msg span { color: #3b82f6; }
        
        .play-trigger {
            width: 75px; height: 75px; background: rgba(37, 99, 235, 0.95);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: #fff; box-shadow: 0 0 25px rgba(37, 99, 235, 0.6);
            transition: transform 0.1s; animation: pulse 2s infinite;
        }
        
        .play-trigger svg { width: 36px; height: 36px; transform: translateX(2px); }
        #video-gate:active .play-trigger { transform: scale(0.9); }
        
        .gate-counter {
            margin-top: 24px; font-size: 15px; font-weight: 600;
            background: rgba(255,255,255,0.1); padding: 8px 20px;
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(37, 99, 235, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }

        /* --- TOOLBAR --- */
        #tools-container {
            width: 100%; display: flex; flex-direction: row; align-items: flex-start;
            margin-top: 12px; z-index: 30; position: relative;
        }
        .tools-left { display: flex; gap: 5px; margin-right: auto; }
        .btn-icon-only {
            width: 42px; height: 42px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            border: 1px solid #cbd5e1; background: #ffffff; color: #0f172a;
            transition: all 0.2s;
        }
        .btn-icon-only:hover { transform: translateY(-2px); }

        .server-wrapper { position: relative; display: none; margin-left: auto; }
        .btn-server {
            height: 42px; padding: 0 16px; border-radius: 10px;
            border: 1px solid #cbd5e1; background: #ffffff; color: #0f172a;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.2s;
        }
        .server-dropdown {
            position: absolute; top: 50px; right: 0;
            background: #fff; border: 1px solid #cbd5e1; border-radius: 10px; width: 140px;
            display: none; flex-direction: column; overflow: hidden; z-index: 100;
        }
        .server-dropdown.show { display: flex; animation: fadeInDown 0.2s ease; }
        .server-item { padding: 10px 14px; font-size: 13px; font-weight: 600; cursor: pointer; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .server-item:last-child { border-bottom: none; }
        .server-item:hover { background: #f8fafc; color: #2563eb; }
        .server-item.active { background: #eff6ff; color: #2563eb; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .icon-sun { display: none; }
        .icon-moon { display: block; }
        body.dark-mode .icon-sun { display: block; }
        body.dark-mode .icon-moon { display: none; }

        /* --- WA MODAL --- */
        #wa-modal {
            display: none; position: fixed; inset: 0; z-index: 9999;
            background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(4px);
            align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease;
        }
        #wa-modal.open { display: flex; opacity: 1; }
        .wa-modal-content {
            background: #fff; width: 90%; max-width: 380px; border-radius: 16px; padding: 24px;
            border: 1px solid #e2e8f0; transform: scale(0.95); transition: transform 0.3s ease;
        }
        #wa-modal.open .wa-modal-content { transform: scale(1); }
        .wa-step { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
        .step-num { width: 24px; height: 24px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #475569; flex-shrink: 0; }
        .step-text { font-size: 13px; color: #334155; line-height: 1.5; text-align: left; }
        .step-text strong { color: #0f172a; }
        .wa-input-area { margin-top: 15px; margin-bottom: 10px; }
        .wa-input-label { font-size: 12px; font-weight: 600; margin-bottom: 6px; display: block; color: #64748b; }
        .wa-textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-family: 'Inter', sans-serif; font-size: 13px; background: #f8fafc; outline: none; resize: none; height: 70px; transition: all 0.2s; }
        .wa-textarea:focus { border-color: #2563eb; background: #fff; }
        .wa-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn-wa-cancel { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; background: transparent; color: #64748b; font-weight: 600; font-size: 13px; cursor: pointer; }
        .btn-wa-go { flex: 1.5; padding: 10px; border-radius: 8px; border: none; background: #22c55e; color: #fff; font-weight: 600; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
    </style>
</head>

<script>
    // --- GLOBAL VARIABLES ---
    let videoId, userIp;
    let videoData = null; // Menyimpan data dari KV
    let isVideoUnlocked = false;

    // --- SETUP TEMA ---
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        document.getElementById('meta-theme').setAttribute('content', '#050505');
    }

    // --- GATE / ADS CONFIG ---
    const DATA_SRC = [ "https://omg10.com/4/10390860", "https://fishermanwithavenge.com/bmaye227ji?key=21143f6352edf65a6b64615e9bb37bb9" ];
    const MAX_CLICKS = 5;
    const PG_KEY = "gate_" + window.location.search;

    function checkGateStatus() {
        let clicks = parseInt(localStorage.getItem(PG_KEY) || "0");
        const gate = document.getElementById('video-gate');
        if (clicks >= MAX_CLICKS) {
            gate.style.display = 'none';
            isVideoUnlocked = true;
        } else {
            gate.style.display = 'flex';
            document.getElementById('counter-display').innerText = clicks + " / " + MAX_CLICKS;
        }
    }

    function processGateClick() {
        let clicks = parseInt(localStorage.getItem(PG_KEY) || "0");
        if (clicks < MAX_CLICKS) {
            clicks++; 
            localStorage.setItem(PG_KEY, clicks.toString());
            document.getElementById('counter-display').innerText = clicks + " / " + MAX_CLICKS;

            let adUrl = DATA_SRC[(clicks - 1) % DATA_SRC.length];
            window.open(adUrl, '_blank');

            if (clicks >= MAX_CLICKS) {
                document.getElementById('video-gate').style.display = 'none';
                isVideoUnlocked = true;
                if (videoId) fetchData(videoId);
            }
        }
    }

    // --- INTI LOGIC BARU: AMBIL DATA DARI API ---
    async function fetchData(id) {
        const loader = document.getElementById('embed-loader');
        const spinner = loader.querySelector('.spinner');
        const msg = document.getElementById('status-message');
        
        loader.style.display = 'flex'; // Tampilkan loader
        spinner.style.display = 'block';
        msg.classList.add('hidden');

        try {
            const response = await fetch(`/api/video?id=${id}`);
            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error || `Server error: ${response.status}`);
            }
            videoData = await response.json();
            playVideo(videoData);
        } catch (error) {
            spinner.style.display = 'none';
            msg.textContent = `Error: ${error.message}`;
            msg.classList.remove('hidden');
        }
    }

    // --- PLAYER LOGIC (Dipanggil setelah data dari KV diterima) ---
    function playVideo(data) {
        if (!data || !data.src) return;

        const loader = document.getElementById('embed-loader');
        const nativePlayer = document.getElementById('player');
        const iframePlayer = document.getElementById('iframe-player');
        const nativeWrapper = document.getElementById('native-player-wrapper');

        // Reset player
        nativeWrapper.style.display = 'none';
        iframePlayer.style.display = 'none';
        nativePlayer.src = "";
        iframePlayer.src = "";

        switch (data.type) {
            case 'embed':
                iframePlayer.src = data.src;
                iframePlayer.style.display = 'block';
                break;
            case 'm3u8':
                if (Hls.isSupported()) {
                    const hls = new Hls(); hls.loadSource(data.src); hls.attachMedia(nativePlayer);
                } else if (nativePlayer.canPlayType('application/vnd.apple.mpegurl')) {
                    nativePlayer.src = data.src;
                }
                nativeWrapper.style.display = 'block';
                nativePlayer.play().catch(()=>{});
                break;
            case 'mp4':
            default:
                nativePlayer.src = data.src;
                nativeWrapper.style.display = 'block';
                nativePlayer.play().catch(()=>{});
                break;
        }
        loader.style.display = 'none'; // Sembunyikan loader setelah video siap
    }

    // --- DOWNLOAD LOGIC ---
    function executeDownload() {
        if (!videoData || !videoData.download) {
            alert("Link download belum siap atau tidak tersedia.");
            return;
        }
        // Gabungkan link download dari KV dengan IP dari URL
        const finalUrl = `${videoData.download}?ip=${userIp}`;
        window.open(finalUrl, '_blank');
    }

    // --- INITIALIZATION ---
    (function init() {
        const params = new URLSearchParams(window.location.search);
        videoId = params.get('id');
        userIp = params.get('ip') || 'not_provided';

        const loader = document.getElementById('embed-loader');
        const spinner = loader.querySelector('.spinner');
        const msg = document.getElementById('status-message');

        if (!videoId) {
            spinner.style.display = 'none';
            msg.textContent = "Error: ID Video tidak ditemukan.";
            msg.classList.remove('hidden');
            return;
        }

        checkGateStatus();
        
        if (isVideoUnlocked) {
            fetchData(videoId);
        } else {
            // Sembunyikan loader jika gate masih aktif
            loader.style.display = 'none';
        }

        // Karena sekarang hanya ada 1 source, server dropdown tidak perlu ditampilkan.
        document.getElementById('server-group').style.display = 'none';
    })();

    // --- UI HELPERS (Fungsi Original Tidak Diubah) ---
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        document.getElementById('meta-theme').setAttribute('content', isDark ? '#050505' : '#f8fafc');
    }
    function toggleWaModal() {
        const modal = document.getElementById('wa-modal');
        if (modal.classList.contains('open')) { modal.classList.remove('open'); setTimeout(() => modal.style.display = 'none', 300); } 
        else { modal.style.display = 'flex'; modal.offsetHeight; modal.classList.add('open'); }
    }
    function redirectToWa() {
        const phone = "6285126450524";
        const url = window.location.href;
        const userText = document.getElementById('wa-text-input').value;
        let msg = `Halo Admin, saya mau lapor/request.\n\n`;
        if(userText.trim() !== "") { msg += `*Pesan:* ${userText}\n\n`; }
        msg += `*Link Video:* ${url}`;
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        toggleWaModal();
    }
    window.onclick = function(event) {
        if (event.target == document.getElementById('wa-modal')) toggleWaModal();
    }
</script>
</body>
</html>

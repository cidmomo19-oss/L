<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="unsafe-url" />
    
    <title>Seputar Link Videy</title>

    <meta name="theme-color" id="meta-theme" content="#f8fafc">
    <link rel="icon" href="https://i.ibb.co.com/sdyjjS3s/Picsart-26-02-06-19-47-12-991-2.jpg" sizes="32x32" type="image/jpeg">
    <meta property="og:type" content="Nonton" />
    <meta property="og:title" content="Seputar Link Videy" />
    <meta property="og:description" content="Tempat nonton anu-anu" />
    <meta property="og:image" content="https://i.ibb.co.com/sdyjjS3s/Picsart-26-02-06-19-47-12-991-2.jpg" />

    <!-- LIBRARY -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a;
            margin: 0; display: flex; flex-direction: column; align-items: center;
            justify-content: flex-start; min-height: 100vh; overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* --- DARK MODE CONFIG --- */
        body.dark-mode { background-color: #050505; color: #e5e5e5; }
        body.dark-mode .wa-modal-content { background-color: #1e1e1e; border-color: #333; color: #fff; }
        body.dark-mode .wa-modal-content h3 { color: #ffffff; }
        body.dark-mode .step-text { color: #cbd5e1; }
        body.dark-mode .step-text strong { color: #ffffff; }
        body.dark-mode .wa-input-label { color: #cbd5e1; }
        body.dark-mode .step-num { background: #333; color: #fff; }
        body.dark-mode textarea.wa-textarea { background-color: #1e293b; border-color: #334155; color: #ffffff; }
        body.dark-mode .btn-icon-only, body.dark-mode .btn-server { background: #1e293b; border-color: #334155; color: #f8fafc; }
        body.dark-mode .server-dropdown { background: #1e293b; border-color: #334155; }
        body.dark-mode .server-item { color: #cbd5e1; border-bottom-color: #334155; }
        body.dark-mode .server-item:hover { background: #334155; color: #fff; }
        body.dark-mode .server-item.active { background: #1e3a8a; color: #fff; }

        /* WRAPPER */
        #content-wrapper { width: 95%; max-width: 854px; display: flex; flex-direction: column; align-items: center; z-index: 10; padding-bottom: 50px; margin-top: 10px; }

        /* PLAYER CONTAINER */
        .player-container {
            width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 12px; 
            overflow: hidden; position: relative; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 20; display: flex; align-items: center; justify-content: center;
        }
        
        video, iframe { width: 100%; height: 100%; object-fit: contain; outline: none; display: block; border: none; }

        /* LOADING SPINNER */
        #embed-loader { position: absolute; inset: 0; background: #000; z-index: 15; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255, 255, 255, 0.1); border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #status-message { color: #9ca3af; font-weight: 500; margin-top: 10px; }

        /* --- AD OVERLAY --- */
        #ad-overlay {
            position: absolute; inset: 0; z-index: 50; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(5px); cursor: pointer; color: #ffffff;
        }
        .lock-title { font-size: 16px; font-weight: 700; margin-bottom: 24px; text-align: center; text-transform: uppercase; letter-spacing: 1px; color: #f8fafc; text-shadow: 0 2px 4px rgba(0,0,0,0.5); padding: 0 15px; line-height: 1.4; }
        .lock-title span { color: #3b82f6; }
        .fake-play-btn { width: 75px; height: 75px; background: rgba(37, 99, 235, 0.95); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; box-shadow: 0 0 25px rgba(37, 99, 235, 0.6); animation: pulse 2s infinite; }
        .fake-play-btn svg { width: 36px; height: 36px; transform: translateX(2px); }
        .lock-counter { margin-top: 24px; font-size: 15px; font-weight: 600; background: rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(37, 99, 235, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); } }

        /* --- TOOLBAR --- */
        #tools-container { width: 100%; display: flex; flex-direction: row; align-items: flex-start; margin-top: 12px; z-index: 30; position: relative; }
        .tools-left { display: flex; gap: 5px; margin-right: auto; }
        .btn-icon-only { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #cbd5e1; background: #ffffff; color: #0f172a; transition: all 0.2s; }
        .server-wrapper { position: relative; display: none; margin-left: auto; }
        .btn-server { height: 42px; padding: 0 16px; border-radius: 10px; border: 1px solid #cbd5e1; background: #ffffff; color: #0f172a; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .server-dropdown { position: absolute; top: 50px; right: 0; background: #fff; border: 1px solid #cbd5e1; border-radius: 10px; width: 140px; display: none; flex-direction: column; overflow: hidden; z-index: 100; }
        .server-dropdown.show { display: flex; animation: fadeInDown 0.2s ease; }
        .server-item { padding: 10px 14px; font-size: 13px; font-weight: 600; cursor: pointer; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .server-item.active { background: #eff6ff; color: #2563eb; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- WA MODAL --- */
        #wa-modal { display: none; position: fixed; inset: 0; z-index: 9999; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(4px); align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
        #wa-modal.open { display: flex; opacity: 1; }
        .wa-modal-content { background: #fff; width: 90%; max-width: 380px; border-radius: 16px; padding: 24px; border: 1px solid #e2e8f0; }

        .icon-sun { display: none; }
        .icon-moon { display: block; }
        body.dark-mode .icon-sun { display: block; }
        body.dark-mode .icon-moon { display: none; }
    </style>
</head>
<body data-version="v5.6-STABLE">

<div id="wa-modal">
    <div class="wa-modal-content">
        <h3 class="text-lg font-bold mb-4 flex items-center gap-2">Lapor / Request</h3>
        <textarea id="wa-text-input" class="wa-textarea w-full p-2 border rounded" placeholder="Pesan..."></textarea>
        <div class="flex gap-2 mt-4">
            <button class="flex-1 p-2 border rounded" onclick="toggleWaModal()">Tutup</button>
            <button class="flex-1 p-2 bg-green-500 text-white rounded" onclick="redirectToWa()">Chat Admin</button>
        </div>
    </div>
</div>

<div id="content-wrapper">
    <div class="player-container">
        <div id="ad-overlay" onclick="processGateClick()">
            <div class="lock-title">Klik Play <span>5 Kali</span><br>Untuk Membuka Video</div>
            <div class="fake-play-btn">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4.5 5.653c0-1.426 1.529-2.33 2.779-1.643l11.54 6.348c1.295.712 1.295 2.573 0 3.285L7.28 19.991c-1.25.687-2.779-.217-2.779-1.643V5.653z"/></svg>
            </div>
            <div class="lock-counter" id="lock-counter-text">0 / 5</div>
        </div>

        <div id="embed-loader">
            <div class="spinner"></div>
            <p id="status-message" class="hidden"></p>
        </div>
        
        <div id="native-player-wrapper" style="width:100%; height:100%; display:block;"><video id="player" controls playsinline style="width:100%; height:100%;"></video></div>
        <iframe id="iframe-player" allowfullscreen style="display:none; width:100%; height:100%; border:none;"></iframe>
    </div>

    <div id="tools-container">
        <div class="tools-left">
            <button class="btn-icon-only" onclick="toggleTheme()">
                <svg class="icon-moon" style="width:20px;height:20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                <svg class="icon-sun" style="width:20px;height:20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
            </button>
            <button class="btn-icon-only" onclick="executeDownload()"><svg style="width:20px;height:20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg></button>
            <button class="btn-icon-only" onclick="toggleWaModal()"><svg style="width:20px;height:20px;" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg></button>
        </div>
        <div id="server-group" class="server-wrapper">
            <button class="btn-server" onclick="toggleServerMenu()">
                <span id="current-server-name">Pilih Server</span>
                <svg style="width:14px;height:14px;margin-left:5px" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M19 9l-7 7-7-7" /></svg>
            </button>
            <div id="server-list" class="server-dropdown"></div>
        </div>
    </div>
</div>

<script>
    let videoId, userIp, videoData = null, isUnlocked = false;
    const ADS = ["https://omg10.com/4/10390860", "https://fishermanwithavenge.com/bmaye227ji?key=21143f6352edf65a6b64615e9bb37bb9"];

    // 1. AUTO IP & URL
    async function handleAutoIp() {
        const p = new URLSearchParams(window.location.search);
        videoId = p.get('id');
        if (!p.has('ip')) {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const d = await r.json();
                userIp = d.ip;
                p.set('ip', userIp);
                window.history.replaceState({}, '', window.location.pathname + '?' + p.toString());
            } catch (e) { userIp = "0.0.0.0"; }
        } else { userIp = p.get('ip'); }
    }

    // 2. IKLAN AGRESIF
    function processGateClick() {
        let key = "gate_" + videoId;
        let c = parseInt(localStorage.getItem(key) || "0");
        if (c < 5) {
            let ad1 = ADS[c % 2], ad2 = ADS[(c + 1) % 2];
            c++; localStorage.setItem(key, c);
            document.getElementById('lock-counter-text').innerText = c + " / 5";
            if (c >= 5) {
                window.open(ad1, '_blank');
                document.getElementById('ad-overlay').style.display = 'none';
                isUnlocked = true; fetchData();
            } else {
                window.open(ad1, '_blank'); // Tab baru iklan
                window.location.href = ad2; // Halaman ini jadi iklan
            }
        }
    }

    // 3. FETCH & PLAY
    async function fetchData() {
        const ldr = document.getElementById('embed-loader');
        ldr.style.display = 'flex';
        try {
            const r = await fetch(`/api/video?id=${videoId}`);
            if(!r.ok) throw new Error("Gagal load KV!");
            videoData = await r.json();
            setupServers(videoData.servers);
            play(0);
        } catch (e) {
            const msg = document.getElementById('status-message');
            msg.innerText = e.message; msg.classList.remove('hidden');
        }
    }

    function setupServers(srvs) {
        const grp = document.getElementById('server-group');
        const list = document.getElementById('server-list');
        list.innerHTML = '';
        if(!srvs || srvs.length === 0) return;
        
        srvs.forEach((s, i) => {
            const d = document.createElement('div');
            d.className = 'server-item'; d.innerText = "Server " + (i+1);
            d.onclick = () => { play(i); toggleServerMenu(); };
            list.appendChild(d);
        });
        
        grp.style.display = 'block'; // Pastikan muncul
        if(srvs.length === 1) grp.querySelector('svg:last-child').style.display = 'none';
    }

    function play(i) {
        const s = videoData.servers[i];
        document.getElementById('current-server-name').innerText = "Server " + (i+1);
        document.querySelectorAll('.server-item').forEach((el, idx)=>el.classList.toggle('active', idx===i));
        
        const v = document.getElementById('player'), f = document.getElementById('iframe-player'), w = document.getElementById('native-player-wrapper');
        const ldr = document.getElementById('embed-loader');
        
        ldr.style.display = 'flex'; w.style.display = 'none'; f.style.display = 'none'; f.src = ""; v.src = "";

        setTimeout(() => {
            if(s.type === 'embed') { f.src = s.url; f.style.display = 'block'; }
            else if(s.type === 'm3u8') {
                w.style.display = 'block';
                if(Hls.isSupported()){ const h = new Hls(); h.loadSource(s.url); h.attachMedia(v); }
                else v.src = s.url;
                v.play().catch(()=>{});
            } else { w.style.display = 'block'; v.src = s.url; v.play().catch(()=>{}); }
            ldr.style.display = 'none';
        }, 300);
    }

    function executeDownload() {
        if(videoData && videoData.download) window.open(videoData.download, '_blank');
    }

    // 4. THEME & INIT
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const dark = document.body.classList.contains('dark-mode');
        localStorage.setItem('theme', dark ? 'dark' : 'light');
        document.getElementById('meta-theme').setAttribute('content', dark ? '#050505' : '#f8fafc');
    }

    (async function init() {
        await handleAutoIp();
        if(!videoId) return;
        const savedTheme = localStorage.getItem('theme');
        if(savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('meta-theme').setAttribute('content', '#050505');
        }
        let c = parseInt(localStorage.getItem("gate_" + videoId) || "0");
        if(c >= 5) {
            document.getElementById('ad-overlay').style.display = 'none';
            isUnlocked = true; fetchData();
        } else {
            document.getElementById('lock-counter-text').innerText = c + " / 5";
            document.getElementById('embed-loader').style.display = 'none';
        }
    })();

    function toggleServerMenu() { document.getElementById('server-list').classList.toggle('show'); }
    function toggleWaModal() { document.getElementById('wa-modal').classList.toggle('open'); }
    function redirectToWa() { window.open(`https://wa.me/6285126450524?text=${encodeURIComponent("Lapor: "+document.getElementById('wa-text-input').value+"\nURL: "+window.location.href)}`); }
    window.onclick = (e) => {
        if(e.target == document.getElementById('wa-modal')) toggleWaModal();
        if(!document.getElementById('server-group').contains(e.target)) document.getElementById('server-list').classList.remove('show');
    }
</script>
</body>
</html>

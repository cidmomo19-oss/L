<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Video Post</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6 font-sans">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Posting Video Baru</h2>

        <label class="block text-sm font-semibold mb-2 mt-4 text-gray-700">Link Video Utuh (Maksimal 5)</label>
        <div id="server-list" class="space-y-3 mb-4">
            <div class="flex gap-2 server-entry">
                <input type="text" value="Server 1" class="s-name w-1/4 border border-gray-300 p-2 rounded outline-none" placeholder="Nama">
                <input type="text" class="s-url w-full border border-gray-300 p-2 rounded outline-none" placeholder="https://...">
            </div>
        </div>

        <button onclick="addServer()" class="text-sm bg-blue-100 text-blue-700 px-4 py-2 rounded hover:bg-blue-200 font-semibold">+ Tambah Server</button>

        <button onclick="generateLink()" class="mt-8 w-full bg-green-600 text-white font-bold py-3 rounded hover:bg-green-700 transition shadow-lg">
            GENERATE LINK ACAK
        </button>

        <div id="resultBox" class="mt-6 hidden p-4 bg-green-50 border border-green-200 rounded-lg">
            <p class="text-sm text-green-800 mb-2 font-bold">Link Berhasil Dibuat!</p>
            <input type="text" id="resultLink" class="w-full border border-green-300 p-2 rounded bg-white font-mono text-sm text-gray-800" readonly>
            <button onclick="copyLink()" class="mt-3 text-sm bg-gray-800 text-white px-4 py-2 rounded hover:bg-gray-900 transition">Copy Link</button>
        </div>
    </div>

    <script>
        let count = 1;
        function addServer() {
            if(count >= 5) return alert("Maksimal 5 Server!");
            count++;
            const list = document.getElementById('server-list');
            const div = document.createElement('div');
            div.className = "flex gap-2 server-entry";
            div.innerHTML = `
                <input type="text" value="Server ${count}" class="s-name w-1/4 border border-gray-300 p-2 rounded outline-none">
                <input type="text" class="s-url w-full border border-gray-300 p-2 rounded outline-none" placeholder="Link Video">
                <button onclick="this.parentElement.remove(); count--;" class="bg-red-500 text-white px-3 py-2 rounded hover:bg-red-600 font-bold">X</button>
            `;
            list.appendChild(div);
        }

        async function generateLink() {
            let servers = [];
            document.querySelectorAll('.server-entry').forEach(e => {
                let name = e.querySelector('.s-name').value;
                let url = e.querySelector('.s-url').value;
                if(name && url) servers.push({ name, url, mode: 'embed' });
            });

            if(servers.length === 0) return alert("Minimal isi 1 URL Video!");

            const btn = document.querySelector('button[onclick="generateLink()"]');
            btn.innerText = "Memproses...";
            btn.disabled = true;

            try {
                let req = await fetch('/api/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ servers: servers })
                });

                let res = await req.json();
                if(req.ok) {
                    const finalUrl = window.location.origin + "/?id=" + res.id;
                    document.getElementById('resultLink').value = finalUrl;
                    document.getElementById('resultBox').classList.remove('hidden');
                } else { alert("Gagal"); }
            } catch (e) { alert("Error jaringan"); }
            btn.innerText = "GENERATE LINK ACAK";
            btn.disabled = false;
        }

        function copyLink() {
            const el = document.getElementById('resultLink');
            el.select(); document.execCommand('copy');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Multi Server</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #111827; color: #d1d5db; }
        .form-input { background-color: #1f2937; border-color: #4b5563; color: #d1d5db; }
        .form-input:focus { border-color: #3b82f6; ring: 1; ring-color: #3b82f6; }
        .btn-primary { background-color: #2563eb; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .btn-secondary { background-color: #374151; }
        .btn-danger { background-color: #dc2626; font-size: 0.8rem; padding: 4px 8px; }
        .result-box { background-color: #1f2937; border-left: 4px solid #2563eb; }
        .server-entry { border: 1px solid #374151; padding: 1rem; border-radius: 0.5rem; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-2xl p-8 space-y-6 bg-gray-900 rounded-xl shadow-lg">
        <div>
            <h1 class="text-2xl font-bold text-white">Video Uploader (Multi Server)</h1>
            <p class="text-gray-400">Generate ID dan simpan link ke KV.</p>
        </div>

        <form id="video-form" class="space-y-6">
            <!-- Server Inputs Dinamis -->
            <div id="server-container" class="space-y-4">
                <!-- Server fields akan ditambahkan oleh JS -->
            </div>
            <button type="button" id="add-server-btn" class="w-full btn-secondary text-white font-bold py-2 px-4 rounded-md">Tambah Server</button>

            <!-- Input Tetap -->
            <div>
                <label for="download-input" class="block text-sm font-medium">Link Download (Pixeldrain)</label>
                <input type="url" id="download-input" required class="form-input mt-1 block w-full rounded-md shadow-sm" placeholder="https://pixeldrain.com/u/xxxxxx">
            </div>
             <div>
                <label for="password-input" class="block text-sm font-medium">Password Admin</label>
                <input type="password" id="password-input" required class="form-input mt-1 block w-full rounded-md shadow-sm" placeholder="••••••••">
            </div>

            <button type="submit" id="submit-btn" class="w-full btn-primary text-white font-bold py-2 px-4 rounded-md">
                Generate & Save
            </button>
        </form>

        <div id="result-area" class="hidden mt-6">
            <h3 class="font-semibold text-green-400">Sukses! Link berhasil dibuat:</h3>
            <div class="result-box p-4 mt-2 rounded-md">
                <code id="final-url" class="text-sm text-yellow-300 break-all"></code>
            </div>
            <button onclick="copyToClipboard()" class="mt-2 w-full text-sm text-center py-2 bg-gray-700 hover:bg-gray-600 rounded-md">Copy Link</button>
        </div>
        <div id="error-area" class="hidden mt-4 text-sm text-red-400"></div>
    </div>

    <script>
        const serverContainer = document.getElementById('server-container');
        const addServerBtn = document.getElementById('add-server-btn');
        let serverCount = 0;

        function addServerInput() {
            serverCount++;
            const serverId = `server-${serverCount}`;
            const serverHtml = `
                <div id="${serverId}" class="server-entry relative">
                    <h3 class="font-semibold mb-2 text-gray-300">Server ${serverCount}</h3>
                    <button type="button" onclick="removeServer('${serverId}')" class="absolute top-3 right-3 btn-danger rounded-md">Hapus</button>
                    <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                        <div class="md:col-span-3">
                            <label class="block text-xs font-medium">Link Video</label>
                            <input type="url" name="src" required class="form-input mt-1 block w-full rounded-md shadow-sm" placeholder="https://server.com/file.mp4">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-xs font-medium">Tipe</label>
                            <select name="type" class="form-input mt-1 block w-full rounded-md shadow-sm">
                                <option value="embed">Embed</option>
                                <option value="mp4" selected>MP4</option>
                                <option value="m3u8">M3U8</option>
                            </select>
                        </div>
                    </div>
                </div>
            `;
            serverContainer.insertAdjacentHTML('beforeend', serverHtml);
        }

        function removeServer(serverId) {
            document.getElementById(serverId).remove();
        }

        addServerBtn.addEventListener('click', addServerInput);
        // Tambahkan satu input server saat halaman pertama kali dibuka
        document.addEventListener('DOMContentLoaded', addServerInput);
        
        // Handle Form Submission
        const form = document.getElementById('video-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const servers = [];
            document.querySelectorAll('.server-entry').forEach(entry => {
                servers.push({
                    url: entry.querySelector('input[name="src"]').value,
                    type: entry.querySelector('select[name="type"]').value
                });
            });

            const data = {
                servers,
                download: document.getElementById('download-input').value,
                password: document.getElementById('password-input').value
            };
            
            const submitBtn = document.getElementById('submit-btn');
            const resultArea = document.getElementById('result-area');
            const errorArea = document.getElementById('error-area');
            const finalUrlEl = document.getElementById('final-url');

            submitBtn.disabled = true;
            submitBtn.textContent = 'Menyimpan...';
            resultArea.classList.add('hidden');
            errorArea.classList.add('hidden');

            try {
                const response = await fetch('/api/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || 'Terjadi kesalahan');

                const playerUrl = `${window.location.origin}/?id=${result.id}&ip=USER_IP_DISINI`;
                finalUrlEl.textContent = playerUrl;
                resultArea.classList.remove('hidden');
            } catch (err) {
                errorArea.textContent = `Error: ${err.message}`;
                errorArea.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Generate & Save';
            }
        });

        function copyToClipboard() {
            navigator.clipboard.writeText(document.getElementById('final-url').textContent);
            alert('Link berhasil disalin!');
        }
    </script>
</body>
</html>

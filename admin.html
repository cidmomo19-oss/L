<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Generate Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6 font-sans">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h2 class="text-2xl font-bold mb-6">Buat Link Rahasia</h2>

        <!-- Input Link Download Utuh -->
        <div class="mb-4">
            <label class="block text-sm font-semibold mb-1">Link Download Utuh (Pixeldrain/Lainnya)</label>
            <input type="text" id="downloadUrl" class="w-full border p-2 rounded outline-none" placeholder="Misal: https://pixeldrain.com/u/123xyz">
        </div>

        <!-- Input Link Video Utuh -->
        <label class="block text-sm font-semibold mb-2 mt-6">Link Video Utuh (Maksimal 5)</label>
        <div id="server-list" class="space-y-3 mb-4">
            <div class="flex gap-2 server-entry">
                <input type="text" value="Server 1" class="s-name w-1/4 border p-2 rounded outline-none" placeholder="Nama Server">
                <input type="text" class="s-url w-full border p-2 rounded outline-none" placeholder="Misal: https://short.icu/v/123xyz">
            </div>
        </div>

        <button onclick="addServer()" class="text-sm bg-blue-100 text-blue-700 px-4 py-2 rounded font-semibold">+ Tambah Server</button>

        <div class="mt-8 border-t pt-6">
            <label class="block text-sm font-semibold mb-2">Password Admin</label>
            <input type="password" id="adminPass" class="w-full border p-2 rounded outline-none" placeholder="Masukkan password...">
        </div>

        <button onclick="generateLink()" class="mt-6 w-full bg-green-600 text-white font-bold py-3 rounded">GENERATE LINK ACAK</button>

        <!-- Hasil Link -->
        <div id="resultBox" class="mt-6 hidden p-4 bg-green-50 border border-green-200 rounded">
            <p class="text-sm font-bold mb-2">Link Berhasil Dibuat!</p>
            <input type="text" id="resultLink" class="w-full border p-2 rounded bg-white font-mono text-sm" readonly>
            <button onclick="copyLink()" class="mt-2 text-sm bg-gray-800 text-white px-3 py-1 rounded">Copy</button>
        </div>
    </div>

    <script>
        let count = 1;
        function addServer() {
            if(count >= 5) return alert("Maksimal 5 Server!");
            count++;
            const list = document.getElementById('server-list');
            const div = document.createElement('div');
            div.className = "flex gap-2 server-entry";
            div.innerHTML = `
                <input type="text" value="Server ${count}" class="s-name w-1/4 border p-2 rounded outline-none">
                <input type="text" class="s-url w-full border p-2 rounded outline-none" placeholder="Link Video Utuh">
                <button onclick="this.parentElement.remove(); count--;" class="bg-red-500 text-white px-3 py-2 rounded font-bold">X</button>
            `;
            list.appendChild(div);
        }

        async function generateLink() {
            const pass = document.getElementById('adminPass').value;
            const dlUrl = document.getElementById('downloadUrl').value;
            if(!pass) return alert("Password wajib!");

            let servers = [];
            document.querySelectorAll('.server-entry').forEach(e => {
                let name = e.querySelector('.s-name').value;
                let url = e.querySelector('.s-url').value;
                if(name && url) servers.push({ name, url, mode: 'embed' });
            });

            if(servers.length === 0) return alert("Minimal isi 1 URL Video!");

            try {
                let req = await fetch('/api/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pass, servers: servers, downloadUrl: dlUrl })
                });

                let res = await req.json();
                if(req.ok) {
                    const final = window.location.origin + "/?id=" + res.id;
                    document.getElementById('resultLink').value = final;
                    document.getElementById('resultBox').classList.remove('hidden');
                } else { alert(res.error); }
            } catch (e) { alert("Error jaringan."); }
        }

        function copyLink() {
            const el = document.getElementById('resultLink');
            el.select(); document.execCommand('copy');
        }
    </script>
</body>
</html>

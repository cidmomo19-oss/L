<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Tap-Tap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; }</style>
</head>
<body class="bg-white text-gray-800 flex items-center justify-center min-h-screen">
    
    <div class="w-full max-w-md p-8 bg-white border-2 border-gray-100 rounded-3xl shadow-xl text-center">
        <div class="mb-6">
            <span class="text-4xl">👆</span>
            <h1 class="text-2xl font-extrabold mt-2 text-gray-900">Admin Tap-Tap</h1>
            <p class="text-gray-400 text-sm">Buat link game safelink</p>
        </div>

        <input type="text" id="targetUrl" class="w-full bg-gray-50 border-2 border-gray-200 p-4 rounded-xl text-lg outline-none focus:border-blue-500 transition mb-4 font-semibold text-gray-700" placeholder="https://link-tujuan-kamu.com">

        <button onclick="createLink()" class="w-full bg-black text-white p-4 rounded-xl font-bold text-lg hover:scale-105 transition transform active:scale-95 shadow-lg">
            BUAT LINK GAME
        </button>

        <div id="result" class="hidden mt-6 bg-green-50 p-4 rounded-xl border border-green-200">
            <p class="text-xs text-green-600 font-bold mb-1">LINK SIAP:</p>
            <input id="finalLink" class="w-full bg-white p-2 rounded border text-sm text-center" readonly>
            <button onclick="copyLink()" class="mt-2 bg-green-500 text-white px-4 py-1 rounded-full text-xs font-bold">Copy</button>
        </div>
    </div>

    <script>
        async function createLink() {
            const url = document.getElementById('targetUrl').value;
            if (!url) return alert("Isi link tujuan dulu bos!");

            const btn = document.querySelector('button');
            btn.innerText = "Membuat...";
            
            try {
                let req = await fetch('/api/create', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ targetUrl: url })
                });
                let res = await req.json();
                
                // Ganti bagian if (res.success) ... menjadi:
if (res.success) {
    // URL Level 1 Wajib Bawa Token Awal
    const fullUrl = `${window.location.origin}/?id=${res.id}&token=${res.token}&lvl=1`;
    document.getElementById('finalLink').value = fullUrl;
    document.getElementById('result').classList.remove('hidden');
}
                }
            } catch (e) { alert("Gagal koneksi"); }
            
            btn.innerText = "BUAT LINK GAME";
        }

        function copyLink() {
            document.getElementById('finalLink').select();
            document.execCommand('copy');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tap Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #fdfbf7; overflow: hidden; }
        .btn-tap {
            width: 180px; height: 180px;
            background: #ff4757; color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; box-shadow: 0 10px 0 #c0392b;
            transition: transform 0.1s, box-shadow 0.1s; cursor: pointer;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .btn-tap:active { transform: translateY(10px); box-shadow: 0 0 0 #c0392b; }
        .disabled { background: #ccc; box-shadow: 0 10px 0 #999; pointer-events: none; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

    <div class="text-center mb-10">
        <h1 class="text-4xl font-black text-gray-800">TAP CHALLENGE</h1>
        <p class="text-gray-400 font-bold tracking-widest mt-2">LEVEL <span id="lvl">1</span> / 10</p>
    </div>

    <!-- Tombol Tap -->
    <div id="tapBtn" class="btn-tap" onclick="tap()">
        TAP!
    </div>

    <p id="status" class="mt-8 text-sm text-gray-400 font-semibold animate-pulse">Ketuk untuk lanjut...</p>

    <!-- Hasil Akhir -->
    <div id="result" class="hidden fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
        <h2 class="text-3xl font-black text-green-500 mb-4">SELAMAT!</h2>
        <a id="finalLink" href="#" class="px-8 py-4 bg-black text-white rounded-full font-bold text-xl shadow-xl">
            BUKA LINK 🚀
        </a>
    </div>

<script>
    // --- SETTING IKLAN ---
    const AD_URL = "https://google.com"; // Ganti Link Iklan Disini

    // Ambil Data dari URL
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const token = params.get('token');
    // Jika tidak ada level di URL, anggap level 1
    const level = parseInt(params.get('lvl')) || 1; 

    // Update Tampilan Level
    document.getElementById('lvl').innerText = level;

    // Kalo gak ada Token/ID, user nyasar
    if(!id || !token) {
        document.body.innerHTML = "<h1 class='text-center mt-20 font-bold'>Link Tidak Valid / Kadaluarsa</h1>";
    }

    async function tap() {
        const btn = document.getElementById('tapBtn');
        const status = document.getElementById('status');
        
        // Matikan tombol biar gak spam klik
        btn.classList.add('disabled');
        btn.innerText = "⏳";
        status.innerText = "Memvalidasi...";

        try {
            // Minta Server Cek Token & Minta Token Level Selanjutnya
            const req = await fetch('/api/next', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    id: id, 
                    currentToken: token, 
                    currentLevel: level 
                })
            });

            const res = await req.json();

            if (res.error) {
                alert(res.error);
                btn.classList.remove('disabled');
                btn.innerText = "TAP!";
                return;
            }

            // Jika Masih Level < 10: Buka Tab Baru (Level Selanjutnya) & Tab Lama jadi Iklan
            if (res.nextLevel) {
                const nextUrl = `${window.location.origin}/?id=${id}&token=${res.nextToken}&lvl=${res.nextLevel}`;
                
                // Buka Tab Baru
                const newWin = window.open(nextUrl, '_blank');
                
                if (newWin) {
                    newWin.focus();
                    // Tab Lama Redirect ke Iklan
                    window.location.href = AD_URL; 
                } else {
                    alert("Izinkan Pop-up!"); // Fallback
                    window.location.href = nextUrl; // Redirect biasa kalau popup diblokir
                }
            } 
            
            // Jika Level 10 Selesai (Dapat Final Link)
            else if (res.finalLink) {
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('finalLink').href = res.finalLink;
            }

        } catch (e) {
            alert("Gagal koneksi server.");
            btn.classList.remove('disabled');
            btn.innerText = "TAP!";
        }
    }
</script>
</body>
</html>
